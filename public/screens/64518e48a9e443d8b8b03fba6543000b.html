</a>

<span class="font-label-bold text-label-bold">Report</span>
</a>

<script>
        function selectOption(el) {
            // Remove selection from all options
            document.querySelectorAll('.option-card').forEach(opt => {
                opt.classList.remove('selected');
                opt.classList.remove('bg-secondary-container');
                opt.classList.add('bg-surface');
            });

            // Add selection to clicked option
            el.classList.add('selected');
            el.classList.remove('bg-surface');
            el.classList.add('bg-secondary-container');

            // Enable Check Button
            const checkBtn = document.getElementById('checkButton');
            checkBtn.disabled = false;
            checkBtn.classList.remove('bg-surface-variant', 'text-on-surface-variant', 'opacity-50');
            checkBtn.classList.add('bg-primary-container', 'text-on-primary', 'opacity-100');
            checkBtn.innerHTML = "CHECK KARO! 🚀";

            // Add small vibration/feedback
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        document.getElementById('checkButton').addEventListener('click', function() {
            const selected = document.querySelector('.option-card.selected span.font-headline-md');
            if (selected && selected.innerText === '200 ml') {
                this.classList.replace('bg-primary-container', 'bg-secondary');
                this.innerText = 'SAHI JAWAB! 🎉';
                
                // Success confetti effect simulation
                document.body.style.backgroundColor = '#f0fff4';
                setTimeout(() => { document.body.style.backgroundColor = '#fbf9f3'; }, 1000);
            } else {
                this.classList.replace('bg-primary-container', 'bg-error');
                this.innerText = 'GALAT! TRY AGAIN ❌';
                setTimeout(() => {
                    this.classList.replace('bg-error', 'bg-primary-container');
                    this.innerText = 'CHEECO JAWAB!';
                }, 1500);
            }
        });
    </script>
