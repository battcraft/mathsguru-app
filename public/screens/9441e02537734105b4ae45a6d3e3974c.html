<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ganit Pop - Mastery Summary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                extend: {
                    "colors": {
                        "surface-container": "#eeeeee",
                        "on-background": "#1a1c1c",

                        "on-secondary-fixed-variant": "#6f3800",
                        "surface-tint": "#b80069",
                        "primary-fixed": "#ffd9e3",
                        "secondary": "#924c00",
                        "surface-bright": "#f9f9f9",
                        "primary": "#b40067",
                        "on-primary-fixed-variant": "#8d004f",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-container": "#fffbff",
                        "secondary-container": "#f88400",
                        "outline": "#8d6f78",
                        "on-error": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#705d00",
                        "primary-fixed-dim": "#ffb0cb",
                        "on-tertiary-fixed": "#221b00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#5b2d00",
                        "on-primary-fixed": "#3e0020",
                        "on-tertiary-container": "#4c3f00",
                        "secondary-fixed": "#ffdcc4",
                        "inverse-primary": "#ffb0cb",
                        "secondary-fixed-dim": "#ffb781",
                        "surface-container-low": "#f3f3f4",
                        "background": "#f9f9f9",
                        "surface": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-surface-variant": "#5a3f48",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffe16d",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-secondary-fixed": "#2f1400",
                        "tertiary-fixed-dim": "#e9c400",
                        "surface-dim": "#dadada",
                        "outline-variant": "#e1bdc7",
                        "primary-container": "#df0b81",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f0f1f1",
                        "tertiary-container": "#c9a900"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "border-width": "3px",
                        "gutter": "16px",
                        "unit": "8px",
                        "shadow-offset": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Fredoka"],
                        "label-bold": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],
                        "headline-xl": ["Fredoka"],
                        "headline-md": ["Fredoka"],
                        "headline-xl-mobile": ["Fredoka"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],

                }
            }
        }

<style>
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow-lg {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow-active:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }
        .bg-dot-pattern {
            background-image: radial-gradient(circle at 1px 1px, #dadada 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface bg-dot-pattern min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-surface border-b-[3px] border-on-surface flex items-center justify-between px-margin-mobile py-unit w-full">
<button class="text-primary hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-transform flex items-center justify-center p-2 border-[3px] border-transparent hover:border-on-surface rounded-full">
<span class="material-symbols-outlined font-headline-md text-headline-md" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary uppercase tracking-tighter">Ganit Pop</h1>
<div class="w-[48px]"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas (Success Splash) -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-12 relative overflow-hidden">
<!-- Background Geometric Decorations -->
<div class="absolute top-10 left-10 w-24 h-24 rounded-full border-[3px] border-on-surface opacity-20 border-dashed"></div>
<div class="absolute bottom-20 right-10 w-32 h-32 bg-primary-fixed border-[3px] border-on-surface opacity-30 transform rotate-12 neo-shadow"></div>
<div class="absolute top-1/4 right-1/4 w-4 h-4 bg-secondary-container rounded-full border-[3px] border-on-surface neo-shadow"></div>
<!-- Constellation Badge Hero -->
<div class="relative z-10 flex flex-col items-center mb-12">
<div class="w-48 h-48 md:w-64 md:h-64 bg-surface-lowest border-[3px] border-on-surface rounded-full neo-shadow-lg flex items-center justify-center relative overflow-hidden bg-white group hover:scale-105 transition-transform duration-300">
<!-- Inner geometric pattern for badge -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-secondary-fixed to-transparent opacity-50"></div>
<!-- Constellation Graphic (CSS constructed) -->
<div class="relative w-full h-full flex items-center justify-center">
<!-- Lines -->
<svg class="absolute w-full h-full p-8" preserveaspectratio="none" viewbox="0 0 100 100">
<polyline fill="none" points="20,50 50,20 80,40 60,80 30,70" stroke="#1a1c1c" stroke-linejoin="miter" stroke-width="3"></polyline>
</svg>
<!-- Points -->
<div class="absolute top-[20%] left-[50%] w-4 h-4 bg-primary border-[3px] border-on-surface rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute top-[50%] left-[20%] w-4 h-4 bg-primary border-[3px] border-on-surface rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute top-[40%] left-[80%] w-4 h-4 bg-primary border-[3px] border-on-surface rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute top-[80%] left-[60%] w-4 h-4 bg-primary border-[3px] border-on-surface rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute top-[70%] left-[30%] w-4 h-4 bg-primary border-[3px] border-on-surface rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
<!-- Center Star -->
<span class="material-symbols-outlined text-[64px] text-secondary-container" style="font-variation-settings: 'FILL' 1; text-shadow: 2px 2px 0 #1a1c1c;">grade</span>
</div>
</div>
<!-- Confetti/Stars around badge -->
<span class="material-symbols-outlined absolute top-0 -left-8 text-primary font-bold rotate-12">flare</span>
<span class="material-symbols-outlined absolute bottom-10 -right-8 text-secondary-container font-bold -rotate-12">flare</span>
</div>
<!-- Typography & Celebration -->
<div class="text-center z-10 mb-12 w-full max-w-2xl">
<h2 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-surface font-extrabold mb-4 uppercase tracking-tight" style="text-shadow: 3px 3px 0 #f88400;">
                Dot to Dot Master!
            </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant font-bold max-w-md mx-auto bg-white border-[3px] border-on-surface px-4 py-2 neo-shadow transform -rotate-2 inline-block">
                You've conquered points and lines. The geometry grid is yours to command.
            </p>
</div>
<!-- Stats Bento Grid (Asymmetric) -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-gutter w-full max-w-3xl z-10 mb-12">
<div class="col-span-2 md:col-span-1 bg-primary border-[3px] border-on-surface p-4 neo-shadow flex flex-col justify-center items-start text-on-primary">
<span class="font-label-bold text-label-bold uppercase opacity-90 mb-1">Accuracy</span>
<span class="font-headline-lg text-headline-lg font-bold">100%</span>
</div>
<div class="bg-surface-container-highest border-[3px] border-on-surface p-4 neo-shadow flex flex-col justify-center items-start">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase mb-1">Points Found</span>
<span class="font-headline-lg text-headline-lg font-bold text-secondary-container" style="text-shadow: 1px 1px 0 #1a1c1c;">42</span>
</div>
<div class="bg-surface-container-highest border-[3px] border-on-surface p-4 neo-shadow flex flex-col justify-center items-start">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase mb-1">Lines Drawn</span>
<span class="font-headline-lg text-headline-lg font-bold text-primary" style="text-shadow: 1px 1px 0 #1a1c1c;">15</span>
</div>
</div>
<!-- Call to Action -->
<div class="w-full max-w-md z-10">
<button class="w-full bg-secondary-container text-on-surface border-[3px] border-on-surface py-4 px-6 neo-shadow neo-shadow-active flex items-center justify-between group bg-white hover:bg-secondary-fixed transition-colors">
<div class="flex flex-col items-start">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider mb-1">Next Topic</span>
<span class="font-headline-md text-headline-md font-bold">Rays &amp; Segments</span>
</div>
<div class="w-12 h-12 bg-primary border-[3px] border-on-surface rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</div>
</button>
</div>
</main>
</body></html>
