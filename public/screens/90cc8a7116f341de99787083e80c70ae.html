<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Symbol Speed Drill</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Nunito+Sans:ital,opsz,wght@0,6..12,400..800;1,6..12,400..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim": "#40e183",
                        "on-tertiary-fixed": "#3f001a",
                        "tertiary-fixed": "#ffd9e1",
                        "surface-container": "#f0eee8",
                        "on-secondary-fixed-variant": "#005229",
                        "primary-container": "#ff6b00",
                        "surface-container-high": "#eae8e2",
                        "tertiary": "#ba005b",
                        "on-secondary-fixed": "#00210d",
                        "on-background": "#1b1c19",
                        "secondary-container": "#63ff9d",
                        "on-tertiary-fixed-variant": "#8f0044",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#7a3000",
                        "inverse-primary": "#ffb693",
                        "surface-variant": "#e4e2dd",
                        "on-secondary-container": "#00743c",
                        "surface": "#fbf9f3",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "outline-variant": "#e2bfb0",
                        "on-primary-container": "#572000",
                        "surface-tint": "#a04100",
                        "on-primary": "#ffffff",
                        "secondary": "#006d38",
                        "on-secondary": "#ffffff",
                        "outline": "#8e7164",
                        "on-tertiary-container": "#67002f",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fbf9f3",
                        "background": "#fbf9f3",
                        "surface-container-highest": "#e4e2dd",
                        "secondary-fixed": "#63ff9d",
                        "inverse-surface": "#30312d",
                        "primary": "#a04100",
                        "primary-fixed-dim": "#ffb693",
                        "on-surface-variant": "#5a4136",
                        "on-primary-fixed": "#351000",
                        "surface-container-low": "#f5f3ee",
                        "tertiary-fixed-dim": "#ffb1c4",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1b1c19",
                        "tertiary-container": "#ff6096",
                        "surface-dim": "#dbdad4",
                        "primary-fixed": "#ffdbcc",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f2f1eb"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "unit": "8px",
                        "container-max-width": "1200px",
                        "margin-mobile": "20px",
                        "margin-desktop": "40px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "headline-xl-mobile": ["Bricolage Grotesque"],
                        "headline-lg": ["Bricolage Grotesque"],
                        "body-lg": ["Nunito Sans"],
                        "headline-md": ["Bricolage Grotesque"],
                        "headline-lg-mobile": ["Bricolage Grotesque"],
                        "label-lg": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],
                        "headline-xl": ["Bricolage Grotesque"]
                    },
                    fontSize: {
                        "headline-xl-mobile": ["36px", { lineHeight: "1.1", fontWeight: "800" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "800" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "500" }],
                        "headline-md": ["24px", { lineHeight: "1.2", fontWeight: "700" }],
                        "headline-lg-mobile": ["28px", { lineHeight: "1.2", fontWeight: "800" }],
                        "label-lg": ["14px", { lineHeight: "1.4", letterSpacing: "0.05em", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "headline-xl": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "800" }]
                    }
                }
            }
        };
    </script>
<style>
        .neo-shadow { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .neo-shadow-sm { box-shadow: 2px 2px 0px 0px rgba(0,0,0,1); }
        .neo-shadow-lg { box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); }
        .neo-border { border: 3px solid #1b1c19; }
        
        .interactive-element:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
        }
        .interactive-element:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 flex items-center justify-between px-margin-mobile py-unit bg-surface border-b-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<div class="flex items-center gap-3">
<button class="interactive-element p-1 rounded-full bg-surface border-[3px] border-on-surface neo-shadow-sm flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary uppercase tracking-tighter">Symbol Speed Drill</h1>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col pt-6 pb-28 px-margin-mobile gap-6 items-center">
<!-- Header Info Row -->
<div class="w-full max-w-md flex justify-between items-center">
<!-- Difficulty Chips -->
<div class="flex gap-2">
<div class="px-3 py-1 bg-primary-container text-on-primary-container neo-border rounded-full neo-shadow-sm font-label-lg text-label-lg uppercase">Easy</div>
<div class="px-3 py-1 bg-surface-variant text-on-surface-variant neo-border rounded-full font-label-lg text-label-lg uppercase opacity-60">Med</div>
<div class="px-3 py-1 bg-surface-variant text-on-surface-variant neo-border rounded-full font-label-lg text-label-lg uppercase opacity-60">Hard</div>
</div>
<!-- Streak Counter -->
<div class="bg-secondary-container text-on-secondary-container neo-border rounded-lg px-4 py-2 neo-shadow flex items-center gap-2 transform rotate-2">
<span class="font-headline-md text-headline-md">Streak: 5</span>
<span class="text-xl">🔥</span>
</div>
</div>
<!-- Instructional Banner -->
<div class="w-full max-w-md mt-4">
<div class="bg-tertiary-container text-on-tertiary-container py-3 px-6 neo-border rounded-2xl neo-shadow text-center transform -rotate-1">
<p class="font-headline-md text-headline-md">Fatafat symbol chuno!</p>
</div>
</div>
<!-- Main Question Area -->
<div class="w-full max-w-md flex-1 flex flex-col justify-center gap-10 mt-4 mb-8">
<!-- Question Card -->
<div class="w-full bg-surface-container-lowest neo-border rounded-[2.5rem] neo-shadow-lg p-10 flex items-center justify-between relative overflow-hidden">
<!-- Background Pattern -->
<div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(#1b1c19 2px, transparent 2px); background-size: 16px 16px;"></div>
<span class="font-headline-xl-mobile text-headline-xl-mobile text-on-surface relative z-10 text-5xl">458</span>
<div class="w-20 h-20 bg-surface-variant neo-border rounded-2xl flex items-center justify-center relative z-10 shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)]">
<span class="material-symbols-outlined text-5xl text-on-surface-variant opacity-50">question_mark</span>
</div>
<span class="font-headline-xl-mobile text-headline-xl-mobile text-on-surface relative z-10 text-5xl">485</span>
</div>
<!-- Action Buttons Area -->
<div class="flex justify-between gap-4 w-full">
<!-- Less Than Button -->
<button class="flex-1 aspect-square bg-tertiary-container text-on-tertiary-container neo-border rounded-[1.5rem] neo-shadow interactive-element flex items-center justify-center transition-all group">
<span class="font-headline-xl-mobile text-headline-xl-mobile text-6xl group-active:scale-90 transition-transform">&lt;</span>
</button>
<!-- Equal Button -->
<button class="flex-1 aspect-square bg-surface-container-high text-on-surface neo-border rounded-[1.5rem] neo-shadow interactive-element flex items-center justify-center transition-all group">
<span class="font-headline-xl-mobile text-headline-xl-mobile text-6xl group-active:scale-90 transition-transform">=</span>
</button>
<!-- Greater Than Button -->
<button class="flex-1 aspect-square bg-secondary-container text-on-secondary-container neo-border rounded-[1.5rem] neo-shadow interactive-element flex items-center justify-center transition-all group">
<span class="font-headline-xl-mobile text-headline-xl-mobile text-6xl group-active:scale-90 transition-transform">&gt;</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-margin-mobile bg-surface border-t-[3px] border-on-surface shadow-[0px_-4px_0px_0px_rgba(0,0,0,1)]">
<!-- Home (Inactive) -->
<a class="text-on-surface flex flex-col items-center gap-1 hover:bg-surface-variant p-2 rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-lg text-label-lg font-bold">Home</span>
</a>
<!-- Chat (Inactive) -->
<a class="text-on-surface flex flex-col items-center gap-1 hover:bg-surface-variant p-2 rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">forum</span>
<span class="font-label-lg text-label-lg font-bold">Chat</span>
</a>
<!-- Quiz (Active) -->
<a class="bg-secondary-container text-on-secondary-container border-[3px] border-on-surface px-5 py-2 rounded-xl flex flex-col items-center gap-1 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transform -translate-y-2" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-lg text-label-lg font-bold">Quiz</span>
</a>
<!-- Story (Inactive) -->
<a class="text-on-surface flex flex-col items-center gap-1 hover:bg-surface-variant p-2 rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-lg text-label-lg font-bold">Story</span>
</a>
</nav>
<script>
        // Simple micro-interaction for button presses
        const buttons = document.querySelectorAll('.interactive-element');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove focus to prevent sticky hover states on mobile
                setTimeout(() => this.blur(), 150);
            });
        });
    </script>
</body></html>
