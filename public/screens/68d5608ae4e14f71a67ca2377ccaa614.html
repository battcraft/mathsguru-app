<script>
        // Simple drag and drop simulation
        const cards = document.querySelectorAll('.number-card');
        const slots = document.querySelectorAll('.drop-slot');

        cards.forEach(card => {
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.innerHTML);
                card.classList.add('opacity-50');
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('opacity-50');
            });
        });

        slots.forEach(slot => {
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('bg-secondary-fixed');
            });

            slot.addEventListener('dragleave', () => {
                slot.classList.remove('bg-secondary-fixed');
            });

            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('bg-secondary-fixed');
                const data = e.dataTransfer.getData('text/plain');
                slot.innerHTML = `<div class="w-full h-full bg-surface border-[3px] border-on-surface rounded-xl flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] scale-90 transition-transform">${data}</div>`;
                slot.classList.remove('border-dashed');
                slot.style.borderStyle = 'solid';
            });
        });
    </script>
