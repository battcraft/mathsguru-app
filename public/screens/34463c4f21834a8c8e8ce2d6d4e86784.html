<style>

            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            -webkit-font-smoothing: antialiased;
        }

            border: 3px solid theme('colors.on-surface');
        }
        
        .neo-brutalist-shadow {
            box-shadow: 4px 4px 0px 0px theme('colors.on-surface');
        }

        .neo-brutalist-interactive {
            transition: all 0.1s ease-in-out;
        }

        .neo-brutalist-interactive:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px theme('colors.on-surface');
        }

<body class="flex flex-col min-h-screen bg-surface w-full max-w-md mx-auto relative pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 bg-surface dark:bg-surface-dim docked full-width top-0 border-b-3 border-on-surface neo-brutalist-border z-50">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 neo-brutalist-border rounded neo-brutalist-shadow bg-surface-container-highest neo-brutalist-interactive">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-black flex-1 text-center truncate px-4">Kahani 2/5</h1>

<!-- Main Content -->
<main class="flex-1 flex flex-col gap-6 p-margin-mobile">
<!-- Hero Image -->
<div class="w-full h-64 neo-brutalist-border neo-brutalist-shadow rounded-xl overflow-hidden relative bg-secondary-container">

</div>

<div class="absolute -top-3 -left-3 bg-secondary-container neo-brutalist-border neo-brutalist-shadow w-8 h-8 rounded-full flex items-center justify-center z-10">
<span class="material-symbols-outlined font-bold text-on-surface text-sm">menu_book</span>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant font-medium mt-2">
                Dekho! Track par numbers race laga rahe hain. Kaun jitega?
            </p>
</div>
<!-- Bold Highlight Box (Accent 2 - Gulabi Pink mapped to tertiary-container) -->
<div class="bg-tertiary-container neo-brutalist-border neo-brutalist-shadow rounded-lg p-6 rotate-1 transform-gpu">
<h2 class="font-headline-md text-headline-md text-on-surface font-black text-center uppercase tracking-wide">
                BADA NUMBER, TEZ BHAAGTA HAI! ⚡
            </h2>
</div>
<!-- Secondary Explanation Box -->
<div class="bg-primary-fixed neo-brutalist-border neo-brutalist-shadow rounded p-5">
<p class="font-body-md text-body-md text-on-surface-variant font-semibold">
                Number <span class="bg-surface font-black px-1 rounded neo-brutalist-border text-primary">85</span> aur Number <span class="bg-surface font-black px-1 rounded neo-brutalist-border text-tertiary">42</span> dono bhag rahe hain. <br/>
<span class="font-black text-primary">85</span> aage nikal gaya kyunki wo bada hai!
            </p>
</div>
<!-- Comparison Pill -->
<div class="flex justify-center my-2">
<div class="bg-[#FFE500] neo-brutalist-border neo-brutalist-shadow rounded-full px-8 py-3 flex items-center gap-3 transform -rotate-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-black">85</span>
<span class="material-symbols-outlined text-on-surface font-black text-2xl">more</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-black">42</span>
