<script>
        // Lightweight JS for drag and drop visual feedback (structural only, no complex logic)
        const draggables = document.querySelectorAll('[draggable="true"]');
        const dropZones = document.querySelectorAll('.border-dashed');

        draggables.forEach(draggable => {
            draggable.addEventListener('dragstart', () => {
                draggable.classList.add('opacity-50');
            });
            draggable.addEventListener('dragend', () => {
                draggable.classList.remove('opacity-50');
            });
        });

        dropZones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('bg-secondary-fixed');
                zone.classList.remove('bg-surface-container-highest');
            });
            zone.addEventListener('dragleave', () => {
                zone.classList.remove('bg-secondary-fixed');
                zone.classList.add('bg-surface-container-highest');
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('bg-secondary-fixed');
                zone.classList.add('bg-surface-container-highest');
                // In a real app, logic to append cloned element goes here.
            });
        });
