<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md selection:bg-secondary-container selection:text-on-secondary-container">
<!-- TopAppBar (Transactional - Suppressed Nav Shells as per instructions, but keeping back button for drill exit) -->
<header class="w-full sticky top-0 z-50 bg-surface border-b-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between px-margin-mobile py-unit md:px-margin-desktop md:py-4 transition-all">
<button class="text-primary hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center p-2 rounded-full border-[3px] border-transparent hover:border-on-surface focus:outline-none focus:ring-4 focus:ring-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary uppercase tracking-tighter">
      Ganit Pop
    </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-start px-margin-mobile py-8 md:px-margin-desktop max-w-container-max-width mx-auto w-full gap-8">
<!-- Header Section -->
<div class="w-full text-center flex flex-col items-center gap-4">
<h1 class="font-headline-xl-mobile text-headline-xl-mobile md:font-headline-xl md:text-headline-xl text-on-surface uppercase tracking-tight">1-Minute Comparison Challenge</h1>
<!-- Timer -->
<div class="relative bg-surface-container-high border-[3px] border-on-surface rounded-full px-8 py-3 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-3xl animate-pulse">timer</span>
<span class="font-headline-lg text-headline-lg text-primary tracking-widest font-mono" id="timerDisplay">00:59</span>
</div>
</div>
<!-- Central Game Card (Bento Style) -->
<div class="w-full max-w-2xl bg-white border-[3px] border-on-surface rounded-xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-8 flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 relative overflow-hidden mt-4">
<!-- Decorative background elements for that Desi Pop feel -->
<div class="absolute -top-10 -left-10 w-32 h-32 bg-secondary-container rounded-full mix-blend-multiply opacity-50 blur-2xl"></div>
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-tertiary-container rounded-full mix-blend-multiply opacity-50 blur-2xl"></div>
<!-- Number 1 -->
<div class="flex-1 w-full bg-surface-container-low border-[3px] border-on-surface rounded-lg p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-center relative">
<span class="font-headline-xl-mobile text-headline-xl-mobile md:font-headline-xl md:text-headline-xl text-on-surface font-mono tracking-tighter">4,502</span>
</div>
<!-- The '?' -->
<div class="w-16 h-16 md:w-20 md:h-20 shrink-0 bg-primary-container border-[3px] border-on-surface rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-center z-10 animate-bounce">
<span class="font-headline-lg text-headline-lg text-on-primary-container font-bold">?</span>
</div>
<!-- Number 2 -->
<div class="flex-1 w-full bg-surface-container-low border-[3px] border-on-surface rounded-lg p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-center relative">
<span class="font-headline-xl-mobile text-headline-xl-mobile md:font-headline-xl md:text-headline-xl text-on-surface font-mono tracking-tighter">4,052</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-2xl flex flex-row items-center justify-center gap-4 md:gap-8 mt-8">
<!-- Less Than Button -->
<button class="flex-1 aspect-square md:aspect-auto md:h-24 bg-tertiary-container border-[3px] border-on-surface rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center group focus:outline-none focus:ring-4 focus:ring-on-surface">
<span class="font-headline-xl text-headline-xl text-on-tertiary-container font-bold group-hover:scale-110 transition-transform">&lt;</span>
</button>
<!-- Equal Button -->
<button class="flex-1 aspect-square md:aspect-auto md:h-24 bg-secondary-container border-[3px] border-on-surface rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center group focus:outline-none focus:ring-4 focus:ring-on-surface">
<span class="font-headline-xl text-headline-xl text-on-secondary-container font-bold group-hover:scale-110 transition-transform">=</span>
</button>
<!-- Greater Than Button -->
<button class="flex-1 aspect-square md:aspect-auto md:h-24 bg-primary-container border-[3px] border-on-surface rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center group focus:outline-none focus:ring-4 focus:ring-on-surface">
<span class="font-headline-xl text-headline-xl text-on-primary-container font-bold group-hover:scale-110 transition-transform">&gt;</span>
</button>
</div>
<!-- Score/Combo Tracker (Desi Pop Accent) -->
<div class="mt-8 px-6 py-2 bg-surface-container border-[3px] border-on-surface rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center gap-4">
<span class="font-label-lg text-label-lg uppercase tracking-widest text-on-surface-variant">Score</span>
<span class="font-headline-md text-headline-md font-mono text-primary">1200</span>
<div class="h-6 w-[3px] bg-on-surface mx-2"></div>
<span class="font-label-lg text-label-lg uppercase tracking-widest text-on-surface-variant">Combo</span>
<span class="font-headline-md text-headline-md font-mono text-secondary">x4</span>
</div>
</main>
<script>
    // Simple timer logic for demonstration
    let timeLeft = 59;
    const timerDisplay = document.getElementById('timerDisplay');
    
    const countdown = setInterval(() => {
      timeLeft--;
      if (timeLeft >= 0) {
        timerDisplay.textContent = `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
      } else {
        clearInterval(countdown);
        timerDisplay.textContent = "00:00";
        timerDisplay.classList.add('text-error');
      }
    }, 1000);
  </script>
