<!-- Simple JS for Option Selection Micro-interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.flex-col.gap-4 button');
            
            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    // Reset all
                    buttons.forEach(btn => {
                        btn.classList.remove('bg-secondary-container');
                        btn.classList.add('bg-surface');
                        const checkIcon = btn.querySelector('.material-symbols-outlined');
                        checkIcon.classList.remove('opacity-100');
                        checkIcon.classList.add('opacity-0');
                    });
                    
                    // Set active
                    this.classList.remove('bg-surface');
                    this.classList.add('bg-secondary-container');
                    const activeCheck = this.querySelector('.material-symbols-outlined');
                    activeCheck.classList.remove('opacity-0');
                    activeCheck.classList.add('opacity-100');
                });
            });
        });
    </script>
