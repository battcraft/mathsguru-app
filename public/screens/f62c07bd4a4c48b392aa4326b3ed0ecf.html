<!DOCTYPE html>

<style>
        body {
            background-image: radial-gradient(#dadada 2px, transparent 2px);
            background-size: 32px 32px;
            background-color: #f9f9f9;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased md:pt-0 pt-[72px] pb-[80px] md:pb-0">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-surface dark:bg-surface-dim border-b-[3px] border-on-surface dark:border-on-surface-variant shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between px-margin-mobile md:px-margin-desktop py-unit w-full md:hidden">
<div class="flex items-center gap-2">
<button class="hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed uppercase tracking-tighter">Ganit Pop</h1>
</div>
<!-- Desktop Nav Placeholder (Hidden on Mobile) -->
<nav class="hidden md:flex gap-4">
<a class="text-on-surface dark:text-on-surface-variant hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all font-label-bold text-label-bold" href="#">Home</a>
<a class="text-on-surface dark:text-on-surface-variant hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all font-label-bold text-label-bold" href="#">Chat</a>
<a class="text-primary dark:text-primary-fixed border-b-[3px] border-primary font-label-bold text-label-bold hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all" href="#">Quiz</a>
<a class="text-on-surface dark:text-on-surface-variant hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all font-label-bold text-label-bold" href="#">Story</a>
</nav>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Quiz Container -->
<article class="bg-surface border-border-width border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] w-full max-w-3xl relative overflow-hidden">
<!-- Decorative Geo Elements -->
<div class="absolute top-4 right-4 w-12 h-12 rounded-full bg-secondary-container border-border-width border-on-surface opacity-50 pointer-events-none"></div>
<div class="absolute -bottom-8 -left-8 w-32 h-32 bg-primary-container border-border-width border-on-surface rotate-12 opacity-50 pointer-events-none"></div>
<!-- Header Area -->
<div class="p-gutter border-b-[3px] border-on-surface flex justify-between items-center bg-tertiary-fixed">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-tertiary-fixed" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-bold text-label-bold text-on-tertiary-fixed uppercase tracking-wider">Expert Panga</span>
</div>
<div class="px-3 py-1 bg-surface border-border-width border-on-surface font-label-bold text-label-bold shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                    Score: 420
                </div>
</div>
<!-- Question Area -->
<div class="p-margin-desktop md:p-12 space-y-6 relative z-10">
<div class="inline-flex items-center gap-2 px-3 py-1 bg-surface-variant border-border-width border-on-surface mb-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all">
<span class="w-3 h-3 rounded-full bg-primary-container border-2 border-on-surface block"></span>
<span class="font-label-bold text-label-bold text-on-surface-variant">Geometry Master</span>
</div>
<h2 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-surface break-words">
                    Dimaag lagao: Kya do points se sirf ek hi line segment ban sakta hai?
                </h2>
<!-- Visual Aid -->
<div class="w-full h-48 bg-surface-container-high border-border-width border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-center relative my-8 overflow-hidden group cursor-crosshair">
<!-- Point A -->
<div class="w-4 h-4 bg-primary-container border-2 border-on-surface rounded-full absolute left-1/4 top-1/2 -translate-y-1/2 z-10">
<span class="absolute -top-6 -left-2 font-label-bold text-label-bold">Point A</span>
</div>
<!-- Point B -->
<div class="w-4 h-4 bg-secondary-container border-2 border-on-surface rounded-full absolute right-1/4 top-1/2 -translate-y-1/2 z-10">
<span class="absolute -top-6 -right-2 font-label-bold text-label-bold">Point B</span>
</div>
<!-- Connecting Line Segment -->
<div class="absolute w-1/2 h-[3px] bg-on-surface top-1/2 -translate-y-1/2 group-hover:bg-primary-container transition-colors duration-300"></div>
<!-- Background Grid for Context -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#1a1c1c 1px, transparent 1px); background-size: 16px 16px;"></div>
</div>
<!-- Options -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter mt-8">
<!-- Option 1 -->
<button class="w-full text-left p-gutter bg-surface border-border-width border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center gap-4 group">
<span class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-primary-container text-on-primary-container border-border-width border-on-surface font-headline-md text-headline-md group-hover:bg-surface-tint group-hover:text-on-primary transition-colors">A</span>
<span class="font-headline-md text-headline-md text-on-surface">Haan bhai, bilkul (True)</span>
</button>
<!-- Option 2 -->
<button class="w-full text-left p-gutter bg-surface border-border-width border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center gap-4 group">
<span class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-secondary-container text-on-secondary-container border-border-width border-on-surface font-headline-md text-headline-md group-hover:bg-secondary group-hover:text-on-secondary transition-colors">B</span>
<span class="font-headline-md text-headline-md text-on-surface">Nahi yaar, infinity lines! (False)</span>
</button>
<!-- Option 3 -->
<button class="w-full text-left p-gutter bg-surface border-border-width border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center gap-4 group">
<span class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-tertiary-container text-on-tertiary-container border-border-width border-on-surface font-headline-md text-headline-md group-hover:bg-tertiary group-hover:text-on-tertiary transition-colors">C</span>
<span class="font-headline-md text-headline-md text-on-surface">Sirf do lines ban sakti hain</span>
</button>
<!-- Option 4 -->
<button class="w-full text-left p-gutter bg-surface border-border-width border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center gap-4 group">
<span class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-outline-variant text-on-surface border-border-width border-on-surface font-headline-md text-headline-md group-hover:bg-outline group-hover:text-surface transition-colors">D</span>
<span class="font-headline-md text-headline-md text-on-surface">Depend karta hai points kitne dur hain</span>
</button>
</div>
</div>
<!-- Footer Action -->
<div class="p-gutter bg-surface-container border-t-[3px] border-on-surface flex justify-between items-center">
<button class="font-label-bold text-label-bold text-on-surface flex items-center gap-1 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help</span> Hint chahiye?
                </button>
<button class="px-6 py-2 bg-on-surface text-surface border-border-width border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all font-label-bold text-label-bold flex items-center gap-2">
                    Skip <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">fast_forward</span>
</button>
</div>
</article>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-margin-mobile bg-surface dark:bg-surface-container-high border-t-[3px] border-on-surface dark:border-on-surface-variant shadow-[0px_-4px_0px_0px_rgba(0,0,0,1)] md:hidden">
<button class="text-on-surface dark:text-on-surface-variant flex flex-col items-center gap-1 hover:bg-surface-variant dark:hover:bg-inverse-surface active:scale-95 transition-transform p-2 rounded">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">home</span>
<span class="font-label-bold text-label-bold">Home</span>
</button>
<button class="text-on-surface dark:text-on-surface-variant flex flex-col items-center gap-1 hover:bg-surface-variant dark:hover:bg-inverse-surface active:scale-95 transition-transform p-2 rounded">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">forum</span>
<span class="font-label-bold text-label-bold">Chat</span>
</button>
<button class="bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary border-[3px] border-on-surface dark:border-on-surface-variant px-4 py-1 rounded-lg active:scale-95 transition-transform flex flex-col items-center gap-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-bold text-label-bold">Quiz</span>
</button>
<button class="text-on-surface dark:text-on-surface-variant flex flex-col items-center gap-1 hover:bg-surface-variant dark:hover:bg-inverse-surface active:scale-95 transition-transform p-2 rounded">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu_book</span>
<span class="font-label-bold text-label-bold">Story</span>
</button>
</nav>
<script>
        // Simple micro-interaction for option buttons
        document.querySelectorAll('button.group').forEach(button => {
            button.addEventListener('click', function() {
                // Remove selected state from all
                document.querySelectorAll('button.group').forEach(btn => {
                    btn.classList.remove('ring-4', 'ring-primary-container', 'bg-surface-variant');
                });
                // Add to clicked
                this.classList.add('ring-4', 'ring-primary-container', 'bg-surface-variant');
                
                // Simulate checking answer after a brief delay
                setTimeout(() => {
                    if(this.querySelector('span:first-child').innerText === 'A') {
                        this.classList.replace('ring-primary-container', 'ring-green-500');
                        this.classList.add('bg-green-100');
                    } else {
                        this.classList.replace('ring-primary-container', 'ring-red-500');
                        this.classList.add('bg-red-100');
                        
                        // Highlight correct answer
                        document.querySelector('button.group:first-child').classList.add('ring-4', 'ring-green-500', 'bg-green-100');
                    }
                }, 400);
            });
        });
    </script>
</body></html>
