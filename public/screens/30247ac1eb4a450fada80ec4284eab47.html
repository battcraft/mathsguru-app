<style>

        /* SVG Interactive Elements Styling */
        .game-shape {
            stroke: #1a1c1c; /* on-background */
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .game-shape:hover {
            stroke: #df0b81; /* primary-container */
            filter: drop-shadow(4px 4px 0px #1a1c1c);
        }

        .game-shape.active-ray {
            stroke: #b40067; /* primary */
            stroke-width: 5px;
            filter: drop-shadow(4px 4px 0px #1a1c1c);
        }

        .game-shape.wrong-tap {
            stroke: #ba1a1a; /* error */
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }

        /* Hide scrollbar for clean canvas */
        body {

<!-- Minimal JavaScript for Interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const shapes = document.querySelectorAll('.game-shape');
            const scoreDisplay = document.getElementById('score-display');
            const successOverlay = document.getElementById('success-overlay');
            let score = 0;
            const totalRays = 5;

            shapes.forEach(shape => {
                shape.addEventListener('click', function() {
                    const type = this.getAttribute('data-type');
                    
                    if (type === 'ray') {
                        if (!this.classList.contains('active-ray')) {
                            this.classList.add('active-ray');
                            // Change marker color logic via CSS is tricky without redefining, 
                            // we swap the marker url for visual feedback
                            this.setAttribute('marker-end', 'url(#arrowhead-active)');
                            score++;
                            scoreDisplay.textContent = `${score}/${totalRays}`;
                            
                            // Check win condition
                            if (score === totalRays) {
                                setTimeout(() => {
                                    successOverlay.classList.remove('opacity-0', 'pointer-events-none');
                                    successOverlay.classList.add('opacity-100');
                                }, 300);
                            }
                        }
                    } else {
                        // Wrong tap
                        this.classList.remove('wrong-tap');
                        void this.offsetWidth; // trigger reflow
                        this.classList.add('wrong-tap');
                        
                        // Small penalty visual feedback
                        document.body.style.backgroundColor = '#ffdad6'; // error-container
                        setTimeout(() => {
                            document.body.style.backgroundColor = '';
                        }, 200);
                    }
                });
            });

            // Simple Timer Simulation
            let timeLeft = 45;
            const timerDisplay = document.getElementById('timer-display');
            const timerInterval = setInterval(() => {
                timeLeft--;
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                timerDisplay.textContent = `00:${seconds}`;
                if (timeLeft <= 10) {
                    timerDisplay.parentElement.classList.add('bg-error', 'text-on-error');
                    timerDisplay.parentElement.classList.remove('bg-tertiary-fixed', 'text-on-tertiary-fixed');
                }
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // Handle Game Over
                }
            }, 1000);
        });
    </script>
