<body class="bg-surface text-on-surface min-h-screen grid-pattern flex flex-col font-body-md relative">

</div>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary uppercase tracking-tighter">Ganit Pop</h1>

</header>

<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="max-w-2xl w-full bg-surface-container-lowest border-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] rounded-lg flex flex-col overflow-hidden">

<!-- Decorative points -->
<div class="absolute top-4 left-4 w-3 h-3 bg-primary rounded-full"></div>
<div class="absolute top-4 right-4 w-3 h-3 bg-primary rounded-full"></div>
<span class="material-symbols-outlined text-[80px] text-on-secondary-container mb-4 block" data-weight="fill" style="font-variation-settings: 'FILL' 1;">crown</span>
<h2 class="font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-secondary-container">Comparison King!</h2>
<p class="font-body-lg text-body-lg text-on-secondary-container mt-2">Mastery Summary: Comparing Numbers</p>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-0 border-b-[3px] border-on-surface">
<!-- Streak Stat -->
<div class="p-8 flex flex-col items-center justify-center border-b-[3px] md:border-b-0 md:border-r-[3px] border-on-surface relative overflow-hidden group">
<div class="absolute inset-0 bg-secondary-fixed opacity-0 group-hover:opacity-100 transition-opacity z-0"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-6xl text-secondary mb-2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<div class="font-headline-lg text-headline-lg text-secondary">15 Days</div>
<div class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider mt-1">Current Streak</div>
</div>
</div>
<!-- Accuracy Stat -->
<div class="p-8 flex flex-col items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-tertiary-fixed opacity-0 group-hover:opacity-100 transition-opacity z-0"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-6xl text-tertiary mb-2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified</span>
<div class="font-headline-lg text-headline-lg text-tertiary">100%</div>
<div class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider mt-1">Accuracy Badge</div>
</div>
</div>
</div>
