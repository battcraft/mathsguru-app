<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ganit Dost - Vertex Collector</title>

        tailwind.config = {
            darkMode: "class",

                extend: {
                    colors: {
                        "on-surface-variant": "#5a3f48",

                        "surface-container-high": "#e8e8e8",
                        "on-secondary-container": "#5b2d00",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container": "#eeeeee",
                        "secondary": "#924c00",
                        "inverse-surface": "#2f3131",

                        "surface-container-low": "#f3f3f4",
                        "secondary-fixed": "#ffdcc4",
                        "on-primary": "#ffffff",

                    },
                    borderRadius: {

                    },
                    spacing: {
                        "unit": "8px",
                        "gutter": "16px",

                        "shadow-offset": "4px",
                        "margin-desktop": "32px"
                    },
                    fontFamily: {
                        "body-md": ["Nunito Sans"],
                        "label-bold": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],

                    fontSize: {

                }
            }
        }

<style>
        .neo-shadow { box-shadow: 4px 4px 0px #1a1c1c; }
        .neo-shadow-lg { box-shadow: 8px 8px 0px #1a1c1c; }
        .bg-grid {
            background-size: 32px 32px;
            background-image: radial-gradient(circle, #dadada 1px, transparent 1px);
        }
        
        /* Game specific animations */
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0.5; }
        }
        .shape-fall { animation: fall 8s linear infinite; }
        .shape-fall-fast { animation: fall 5s linear infinite; }
        .shape-fall-slow { animation: fall 12s linear infinite; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full bg-background text-on-background font-body-md bg-grid flex flex-col relative overflow-hidden">
<!-- TopAppBar Semantic Shell (Since it's a game, we might suppress nav, but keeping header for context) -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 z-50 sticky top-0 bg-background border-b-3 border-black shadow-[4px_4px_0px_#1A1A1A]">
<div class="flex items-center gap-2">
<button aria-label="Go Back" class="w-10 h-10 rounded-full border-3 border-black flex items-center justify-center bg-surface hover:bg-surface-container-high transition-all active:translate-x-1 active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined font-label-bold text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-extrabold text-primary">Ganit Dost</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-1 border-3 border-black rounded-full px-3 py-1 bg-surface-container-lowest neo-shadow">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-bold text-label-bold text-on-surface">Streak: 12</span>
</div>
<div class="w-10 h-10 rounded-full border-3 border-black bg-tertiary-container overflow-hidden neo-shadow cursor-pointer hover:bg-surface-container-high transition-all active:translate-x-1 active:translate-y-1 active:shadow-none">
<img alt="Student Profile Avatar" class="w-full h-full object-cover" data-alt="A brightly colored avatar image for a student profile, featuring geometric shapes and vibrant neo-brutalist colors like pink and yellow on a bold black background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSFWql8rko-fAJ8UdR3gPJac0iTEg1ta0pcECYTC2TjMBigeaE0qXTLy2T6eFN9HLd01jRImOMWokY9lqdk5rp_BBYJJtulO_JMQ6xGxDLdEtYqSepTk5IwHjhem3D6FHOeyQQYsG5SqKBWstpnUSMpSIY4gD9-h31cXj4y6p_df_zGAkGA7IOPdG5IY4zMphiOLdXnYA7SFXVSNt7fNBYsfswnu9FnjHD3ip7ETWSwZslvdXop4WCLSRnECY66F5jHlq2t-juMhMD"/>
</div>
</div>
</header>
<!-- Main Game Canvas -->
<main class="flex-grow relative flex flex-col items-center justify-center p-4">
<!-- Score & Combo HUD -->
<div class="absolute top-4 left-4 right-4 flex justify-between z-10 pointer-events-none">
<div class="flex flex-col gap-2 pointer-events-auto">
<div class="bg-surface-container-lowest border-3 border-black rounded-lg p-3 neo-shadow min-w-[150px]">
<p class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Score</p>
<p class="font-headline-xl text-headline-xl text-primary font-extrabold leading-none">2,450</p>
</div>
<div class="bg-secondary-container border-3 border-black rounded-lg p-2 neo-shadow w-fit flex items-center gap-2">
<span class="material-symbols-outlined text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-bold text-label-bold text-on-secondary-container font-extrabold">High: 5,120</span>
</div>
</div>
<div class="pointer-events-auto flex flex-col items-end">
<div class="bg-tertiary-container border-3 border-black rounded-full w-24 h-24 flex flex-col items-center justify-center neo-shadow animate-pulse">
<span class="font-headline-lg text-headline-lg text-on-tertiary-container font-extrabold leading-tight">x4</span>
<span class="font-label-bold text-label-bold text-on-tertiary-container">COMBO</span>
</div>
<!-- Combo meter bar -->
<div class="w-32 h-4 border-3 border-black rounded-full mt-2 bg-surface-container-lowest overflow-hidden neo-shadow">
<div class="h-full bg-primary w-3/4"></div>
</div>
</div>
</div>
<!-- Game Area Overlay (Instructions) -->
<div class="absolute bottom-10 z-20 pointer-events-none text-center">
<p class="font-headline-md text-headline-md text-on-surface font-extrabold bg-surface-container-lowest border-3 border-black px-6 py-3 rounded-full neo-shadow inline-block">
                Tap every <span class="text-primary">Vertex</span>!
            </p>
</div>
<!-- Falling Shapes Layer (Simulated) -->
<div class="absolute inset-0 overflow-hidden pointer-events-auto">
<!-- Shape 1: Triangle -->
<div class="absolute left-[20%] top-0 shape-fall" style="animation-delay: 0s;">
<svg class="fill-surface-container-lowest stroke-black stroke-[3px] drop-shadow-[4px_4px_0px_#1a1c1c]" height="100" viewbox="0 0 100 100" width="100">
<polygon points="50,10 90,90 10,90"></polygon>
<!-- Vertices to tap -->
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="50" cy="10" r="8"></circle>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="90" cy="90" r="8"></circle>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="10" cy="90" r="8"></circle>
</svg>
</div>
<!-- Shape 2: Square -->
<div class="absolute left-[50%] top-0 shape-fall-fast" style="animation-delay: 1.5s;">
<svg class="fill-secondary-container stroke-black stroke-[3px] drop-shadow-[4px_4px_0px_#1a1c1c]" height="80" viewbox="0 0 80 80" width="80">
<rect height="60" width="60" x="10" y="10"></rect>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="10" cy="10" r="8"></circle>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="70" cy="10" r="8"></circle>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="10" cy="70" r="8"></circle>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="70" cy="70" r="8"></circle>
</svg>
</div>
<!-- Shape 3: Pentagon -->
<div class="absolute left-[75%] top-0 shape-fall-slow" style="animation-delay: 3s;">
<svg class="fill-tertiary-container stroke-black stroke-[3px] drop-shadow-[4px_4px_0px_#1a1c1c]" height="110" viewbox="0 0 100 100" width="110">
<polygon points="50,10 90,40 75,90 25,90 10,40"></polygon>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="50" cy="10" r="8"></circle>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="90" cy="40" r="8"></circle>
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="75" cy="90" r="8"></circle>
<circle class="fill-surface-tint opacity-50" cx="25" cy="90" r="8"></circle> <!-- Tapped state simulation -->
<circle class="fill-primary cursor-pointer hover:r-12 transition-all" cx="10" cy="40" r="8"></circle>
</svg>
</div>
<!-- Shape 4: Hexagon (Rotated) -->
<div class="absolute left-[35%] top-0 shape-fall" style="animation-delay: 4.5s;">
<svg class="fill-inverse-primary stroke-black stroke-[3px] drop-shadow-[4px_4px_0px_#1a1c1c]" height="90" viewbox="0 0 100 100" width="90">
<polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5"></polygon>
<circle class="fill-primary cursor-pointer" cx="50" cy="5" r="8"></circle>
<circle class="fill-primary cursor-pointer" cx="90" cy="27.5" r="8"></circle>
<circle class="fill-primary cursor-pointer" cx="90" cy="72.5" r="8"></circle>
<circle class="fill-primary cursor-pointer" cx="50" cy="95" r="8"></circle>
<circle class="fill-primary cursor-pointer" cx="10" cy="72.5" r="8"></circle>
<circle class="fill-primary cursor-pointer" cx="10" cy="27.5" r="8"></circle>
</svg>
</div>
</div>
</main>
<!-- Suppressed Bottom Navigation: This is a focused task/game, so the BottomNavBar is hidden according to rules -->
</body></html>
