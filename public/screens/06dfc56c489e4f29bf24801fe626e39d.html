<style>
        /* Neo-Brutalist Background Pattern */
        body {
            background-color: theme('colors.surface');
            background-image: radial-gradient(circle, theme('colors.outline-variant') 2px, transparent 2px);
            background-size: 32px 32px;
        }

        /* Timer Animation */
        @keyframes drain {
            from { width: 100%; background-color: theme('colors.primary'); }
            50% { background-color: theme('colors.secondary-container'); }
            to { width: 0%; background-color: theme('colors.error'); }
        }
        
        .timer-drain {
            animation: drain 5s linear infinite;
        }

        /* Standard Neo-Brutalist Box Shadow */
        .brutal-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        
        .brutal-shadow-active:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(4px, 4px);
        }

        .brutal-border {
            border: 3px solid theme('colors.on-surface');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col text-on-surface font-body-md overflow-x-hidden">
<!-- TopAppBar (from JSON) -->
<header class="w-full sticky top-0 z-50 bg-surface dark:bg-surface-dim border-b-[3px] border-on-surface dark:border-on-surface-variant shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<div class="flex items-center justify-between px-margin-mobile py-unit w-full h-16">
<!-- Leading Icon -->
<button class="text-primary dark:text-primary-fixed hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-transform w-10 h-10 flex items-center justify-center brutal-border bg-surface-container rounded-DEFAULT">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Headline / Brand -->
<h1 class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed uppercase tracking-tighter">
                Ganit Pop
            </h1>
<!-- Placeholder for balance to keep title centered if needed, or action items -->
<div class="w-10 h-10 flex items-center justify-center">
<span class="material-symbols-outlined font-headline-md text-headline-md text-tertiary" data-icon="timer">timer</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start pt-8 pb-20 px-margin-mobile md:px-margin-desktop w-full max-w-4xl mx-auto gap-8 relative z-10">
<!-- Header Section: Score & Timer -->
<div class="w-full flex flex-col gap-4">
<!-- Score & Streak -->
<div class="flex justify-between items-center w-full px-2">
<div class="flex items-center gap-2">
<div class="w-4 h-4 rounded-full bg-primary brutal-border shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<span class="font-headline-md text-headline-md text-on-surface">Score: 1250</span>
</div>
<div class="bg-tertiary-fixed text-on-tertiary-fixed px-3 py-1 brutal-border shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] rounded-DEFAULT font-label-bold text-label-bold flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
                    x5 Combo
                </div>
</div>
<!-- Timer Bar Container -->
<div class="w-full h-8 bg-surface-container brutal-border rounded-full overflow-hidden shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] relative">
<!-- Draining Bar -->
<div class="h-full timer-drain border-r-[3px] border-on-surface absolute left-0 top-0 rounded-l-full"></div>
</div>
</div>
<!-- Instruction Area -->
<div class="mt-4 text-center">
<h2 class="font-headline-md text-headline-md text-primary bg-surface px-4 py-2 brutal-border shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] inline-block transform -rotate-2">
                Fatafat symbol chuno!
            </h2>
</div>
<!-- Drill Area: Decimal Comparison -->
<div class="w-full flex flex-col items-center gap-12 mt-8">
<!-- Numbers Display -->
<div class="flex items-center justify-center gap-4 md:gap-8 w-full">
<!-- Left Number -->
<div class="bg-surface-container-highest brutal-border brutal-shadow rounded-lg p-6 md:p-10 flex-1 flex justify-center items-center">
<span class="font-headline-xl text-headline-xl text-on-surface tracking-wider">0.05</span>
</div>
<!-- The "VS" or Operator Drop Zone -->
<div class="w-16 h-16 md:w-20 md:h-20 shrink-0 bg-surface border-[3px] border-dashed border-outline rounded-full flex items-center justify-center relative">
<span class="font-headline-md text-headline-md text-outline-variant absolute">?</span>
</div>
<!-- Right Number -->

</div>
</div>
<!-- Action Buttons (<, =, >) -->
<div class="w-full max-w-lg grid grid-cols-3 gap-4 md:gap-6 mt-4">
<!-- Less Than Button -->
<button class="aspect-square bg-tertiary-fixed hover:bg-tertiary-fixed-dim text-on-tertiary-fixed brutal-border brutal-shadow brutal-shadow-active rounded-xl flex flex-col items-center justify-center gap-2 transition-all group">
<span class="font-headline-xl text-headline-xl group-hover:scale-110 transition-transform">&lt;</span>
</button>
<!-- Equal Button -->
<button class="aspect-square bg-surface hover:bg-surface-variant text-on-surface brutal-border brutal-shadow brutal-shadow-active rounded-xl flex flex-col items-center justify-center gap-2 transition-all group">
<span class="font-headline-xl text-headline-xl group-hover:scale-110 transition-transform">=</span>
</button>
<!-- Greater Than Button -->
<button class="aspect-square bg-primary-container hover:bg-primary-fixed-dim text-on-primary-container brutal-border brutal-shadow brutal-shadow-active rounded-xl flex flex-col items-center justify-center gap-2 transition-all group">
<span class="font-headline-xl text-headline-xl group-hover:scale-110 transition-transform">&gt;</span>
</button>
</div>
</div>
</main>
<!-- Suppressed BottomNavBar: The prompt indicates this is a 'Practice Zone' -> 'Speed Drill'. 
         According to the logic mandate: "Automatic Suppression: You MUST exclude the navigation shell if the page intent is... Task-Focused". 
         Therefore, the BottomNavBar is intentionally omitted from this layout. -->
<script>
        // Simple script to reset the timer animation for demonstration purposes
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                const timer = document.querySelector('.timer-drain');
                if(timer) {
                    timer.style.animation = 'none';
                    timer.offsetHeight; /* trigger reflow */
                    timer.style.animation = null; 
                }
            });
        });
    </script>
</body></html>
