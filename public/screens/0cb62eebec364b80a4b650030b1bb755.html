<script>
        document.addEventListener('DOMContentLoaded', () => {
            const draggables = document.querySelectorAll('.draggable-item');
            const dropzones = document.querySelectorAll('.dropzone');
            
            draggables.forEach(draggable => {
                draggable.addEventListener('dragstart', () => {
                    draggable.classList.add('opacity-50');
                    draggable.classList.add('dragging');
                });
                
                draggable.addEventListener('dragend', () => {
                    draggable.classList.remove('opacity-50');
                    draggable.classList.remove('dragging');
                });
            });
            
            dropzones.forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('dragover');
                });
                
                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('dragover');
                });
                
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('dragover');
                    const draggable = document.querySelector('.dragging');
                    if (draggable) {
                        const targetBox = zone.querySelector('.drop-target');
                        targetBox.innerHTML = ''; // Clear 'add' icon
                        targetBox.appendChild(draggable);
                        draggable.classList.remove('h-24', 'neo-brutalist-shadow'); // adjust styling when dropped
                        draggable.classList.add('h-full', 'w-full', 'border-0');
                    }
                });
            });
        });
    </script>
