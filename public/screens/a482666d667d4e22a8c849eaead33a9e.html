<script>
        // Simple micro-interaction for the "Choice" buttons
        document.querySelectorAll('.neo-brutalist-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('bg-tertiary-fixed');
                setTimeout(() => {
                    this.classList.remove('bg-tertiary-fixed');
                }, 200);
            });
        });

        // Atmospheric effect: gentle floating for the robot's speech bubble
        const bubble = document.querySelector('.speech-bubble');
        if(bubble) {
            let start = Date.now();
            function animate() {
                let delta = (Date.now() - start) / 1000;
                let y = Math.sin(delta * 2) * 5;
                bubble.style.transform = `translateY(${y}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
