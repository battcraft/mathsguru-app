<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Practice Zone - Coordinate Crossword</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&amp;family=Nunito+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eeeeee",
                        "on-background": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#6f3800",
                        "surface-tint": "#b80069",
                        "primary-fixed": "#ffd9e3",
                        "secondary": "#924c00",
                        "surface-bright": "#f9f9f9",
                        "primary": "#b40067",
                        "on-primary-fixed-variant": "#8d004f",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-container": "#fffbff",
                        "secondary-container": "#f88400",
                        "outline": "#8d6f78",
                        "on-error": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#705d00",
                        "primary-fixed-dim": "#ffb0cb",
                        "on-tertiary-fixed": "#221b00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#5b2d00",
                        "on-primary-fixed": "#3e0020",
                        "on-tertiary-container": "#4c3f00",
                        "secondary-fixed": "#ffdcc4",
                        "inverse-primary": "#ffb0cb",
                        "secondary-fixed-dim": "#ffb781",
                        "surface-container-low": "#f3f3f4",
                        "background": "#f9f9f9",
                        "surface": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-surface-variant": "#5a3f48",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffe16d",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-secondary-fixed": "#2f1400",
                        "tertiary-fixed-dim": "#e9c400",
                        "surface-dim": "#dadada",
                        "outline-variant": "#e1bdc7",
                        "primary-container": "#df0b81",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f0f1f1",
                        "tertiary-container": "#c9a900"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "border-width": "3px",
                        "gutter": "16px",
                        "unit": "8px",
                        "shadow-offset": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Fredoka"],
                        "label-bold": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],
                        "headline-xl": ["Fredoka"],
                        "headline-md": ["Fredoka"],
                        "headline-xl-mobile": ["Fredoka"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-xl-mobile": ["36px", { "lineHeight": "1.1", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-image: radial-gradient(#dadada 2px, transparent 2px);
            background-size: 32px 32px;
            background-color: #f9f9f9;
        }
        .grid-lines {
            background-image: 
                linear-gradient(to right, #e2e2e2 1px, transparent 1px),
                linear-gradient(to bottom, #e2e2e2 1px, transparent 1px);
            background-size: 48px 48px;
            background-position: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md selection:bg-primary selection:text-on-primary">
<!-- TopAppBar (Suppressed navigation, focus on canvas) -->
<header class="w-full sticky top-0 z-50 bg-surface border-b-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between px-margin-mobile py-unit">
<div class="flex items-center gap-4">
<button aria-label="Go Back" class="w-10 h-10 flex items-center justify-center border-[3px] border-on-surface bg-surface-container rounded hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary uppercase tracking-tighter">Ganit Pop</h1>
</div>
<div class="font-label-bold text-label-bold px-3 py-1 bg-tertiary-fixed border-[3px] border-on-surface shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Score: 420</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col md:flex-row p-margin-mobile md:p-margin-desktop gap-gutter md:gap-margin-desktop items-center justify-center overflow-hidden relative">
<!-- Decorative Elements -->
<div class="hidden md:block absolute top-10 left-10 w-24 h-24 border-[3px] border-on-surface rounded-full opacity-20 pointer-events-none"></div>
<div class="hidden md:block absolute bottom-20 right-10 w-32 h-8 bg-secondary-container border-[3px] border-on-surface transform rotate-12 opacity-30 pointer-events-none"></div>
<!-- Question Card -->
<section class="w-full md:w-1/3 bg-surface border-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex flex-col z-10">
<div class="border-b-[3px] border-on-surface p-4 bg-primary-container text-on-primary-container">
<h2 class="font-headline-md text-headline-md">Coordinate Crossword</h2>
<div class="flex gap-2 mt-2">
<span class="bg-secondary-container border-[3px] border-on-surface px-2 py-1 text-xs font-label-bold shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Geometry</span>
<span class="bg-tertiary-container border-[3px] border-on-surface px-2 py-1 text-xs font-label-bold shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Level 3</span>
</div>
</div>
<div class="p-6 flex-grow flex flex-col justify-center">
<p class="font-headline-md text-headline-md text-center mb-8">What letter is located at</p>
<div class="text-center font-headline-xl text-headline-xl bg-tertiary-fixed border-[3px] border-on-surface py-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform -rotate-2 w-max mx-auto px-8 mb-8">
                    (2, 4)?
                </div>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Tap the correct point on the grid to answer.</p>
</div>
</section>
<!-- Interactive Grid Area -->
<section class="w-full md:w-2/3 max-w-[600px] aspect-square bg-surface border-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] relative grid-lines flex flex-col p-4 md:p-8">
<!-- Axes Labels -->
<div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 font-label-bold text-label-bold bg-surface px-2 border-[3px] border-on-surface z-20">X Axis (Horizontal)</div>
<div class="absolute left-2 top-1/2 transform -translate-y-1/2 -rotate-90 origin-center font-label-bold text-label-bold bg-surface px-2 border-[3px] border-on-surface whitespace-nowrap z-20">Y Axis (Vertical)</div>
<!-- Coordinate Grid Container -->
<div class="flex-grow relative border-[3px] border-on-surface bg-white/80 overflow-hidden" id="play-grid">
<!-- Numbers X -->
<div class="absolute bottom-0 w-full flex justify-between px-6 text-xs font-bold text-on-surface-variant opacity-50 z-0 border-t border-dashed border-on-surface-variant h-6 items-center">
<span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
</div>
<!-- Numbers Y -->
<div class="absolute left-0 h-full flex flex-col-reverse justify-between py-6 text-xs font-bold text-on-surface-variant opacity-50 z-0 border-r border-dashed border-on-surface-variant w-6 items-center">
<span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
</div>
<!-- Interactive Points -->
<!-- Grid is conceptually 6x6 (0-5), positioning based on percentages -->
<!-- Target (2,4) -->
<button aria-label="Point at 2, 4" class="absolute w-10 h-10 -ml-5 -mb-5 flex items-center justify-center font-headline-md text-headline-md bg-primary-container text-on-primary-container border-[3px] border-on-surface rounded-full shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:bg-primary hover:text-on-primary hover:scale-110 active:scale-95 active:shadow-none transition-all z-10" style="left: 40%; bottom: 80%;">
                    K
                </button>
<!-- Distractor (4,2) -->
<button aria-label="Point at 4, 2" class="absolute w-10 h-10 -ml-5 -mb-5 flex items-center justify-center font-headline-md text-headline-md bg-secondary-container text-on-secondary-container border-[3px] border-on-surface rounded-full shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:bg-secondary hover:text-on-secondary hover:scale-110 active:scale-95 active:shadow-none transition-all z-10" style="left: 80%; bottom: 40%;">
                    X
                </button>
<!-- Distractor (1,1) -->
<button aria-label="Point at 1, 1" class="absolute w-10 h-10 -ml-5 -mb-5 flex items-center justify-center font-headline-md text-headline-md bg-tertiary-fixed text-on-tertiary-fixed border-[3px] border-on-surface rounded-full shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:bg-tertiary hover:text-on-tertiary hover:scale-110 active:scale-95 active:shadow-none transition-all z-10" style="left: 20%; bottom: 20%;">
                    A
                </button>
<!-- Distractor (3,5) -->
<button aria-label="Point at 3, 5" class="absolute w-10 h-10 -ml-5 -mb-5 flex items-center justify-center font-headline-md text-headline-md bg-surface-variant text-on-surface-variant border-[3px] border-on-surface rounded-full shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:bg-surface-dim hover:scale-110 active:scale-95 active:shadow-none transition-all z-10" style="left: 60%; bottom: 100%;">
                    M
                </button>
<!-- Origin (0,0) Marker -->
<div class="absolute w-3 h-3 -ml-1.5 -mb-1.5 bg-on-surface rounded-full" style="left: 0; bottom: 0;"></div>
</div>
<!-- Action Area within Grid -->
<div class="mt-4 flex justify-between items-center h-12">
<button class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-lg" data-icon="lightbulb">lightbulb</span> Need a hint?
                </button>
</div>
</section>
</main>
<script>
        // Simple interaction script
        const buttons = document.querySelectorAll('#play-grid button');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove previous selection states
                buttons.forEach(b => {
                    b.classList.remove('ring-4', 'ring-offset-2', 'ring-primary');
                    if(b !== this) b.style.opacity = '0.5';
                });
                
                // Add selection state to clicked button
                this.classList.add('ring-4', 'ring-offset-2', 'ring-primary');
                this.style.opacity = '1';

                // Simulate feedback
                if(this.innerText.trim() === 'K') {
                    // Success
                    setTimeout(() => {
                        alert('Correct! K is at (2, 4).');
                        // Reset
                        buttons.forEach(b => b.style.opacity = '1');
                        this.classList.remove('ring-4', 'ring-offset-2', 'ring-primary');
                    }, 500);
                } else {
                    // Error visually (shake or red highlight could go here, keeping it simple)
                    setTimeout(() => {
                        buttons.forEach(b => b.style.opacity = '1');
                        this.classList.remove('ring-4', 'ring-offset-2', 'ring-primary');
                    }, 800);
                }
            });
        });
    </script>
</body></html>
