<script>
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('.option-btn');
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackIconContainer = document.getElementById('feedback-icon-container');
            const feedbackIcon = document.getElementById('feedback-icon');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackMessage = document.getElementById('feedback-message');
            
            let answered = false;

            options.forEach(option => {
                option.addEventListener('click', function() {
                    if (answered) return;
                    
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    
                    // Reset styling on all options
                    options.forEach(opt => {
                        opt.classList.remove('success-animation', 'incorrect-animation', 'selected');
                        opt.style.opacity = '0.5';
                    });
                    
                    this.style.opacity = '1';
                    this.classList.add('selected');

                    if (isCorrect) {
                        this.classList.add('success-animation');
                        
                        // Show success feedback
                        feedbackIconContainer.className = 'w-16 h-16 rounded-full border-[3px] border-on-surface flex items-center justify-center mb-4 bg-tertiary-container text-on-tertiary-container';
                        feedbackIcon.innerText = 'check';
                        feedbackTitle.innerText = 'Ekdam Sahi! (Spot On!)';
                        feedbackMessage.innerHTML = 'A <strong>matchstick</strong> represents a line segment because it has two fixed endpoints. It starts and ends at specific points.';
                        
                        answered = true;
                    } else {
                        this.classList.add('incorrect-animation');
                        
                        // Show error feedback temporarily
                        setTimeout(() => {
                            this.classList.remove('incorrect-animation');
                            options.forEach(opt => opt.style.opacity = '1');
                            this.classList.remove('selected');
                        }, 500);
                        
                        // Optional: show incorrect feedback text
                         feedbackIconContainer.className = 'w-16 h-16 rounded-full border-[3px] border-on-surface flex items-center justify-center mb-4 bg-error-container text-on-error-container';
                         feedbackIcon.innerText = 'close';
                         feedbackTitle.innerText = 'Oops! Try again.';
                         feedbackMessage.innerText = 'Think about what has two fixed ends. A road or ray goes on too far!';
                    }
                    
                    // Display feedback area
                    feedbackArea.classList.remove('hidden');
                    // Small delay to allow display block to apply before transition
                    setTimeout(() => {
                        feedbackArea.classList.remove('opacity-0');
                        feedbackArea.classList.add('opacity-100');
                    }, 10);
                });
            });
        });
    </script>
