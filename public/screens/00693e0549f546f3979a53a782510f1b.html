<img alt="Flashlight emitting a ray" class="w-full h-full object-cover absolute inset-0 opacity-80" data-alt="A stylized, neo-brutalist illustration of a flashlight (torch) emitting a single beam of light. The flashlight is composed of solid geometric shapes with thick black outlines, primarily in bright yellow and pink hues on a light background. A prominent, solid magenta dot is visible right at the bulb, representing the vertex or starting point. The beam extends outward like a mathematical ray, rendered with stark, unblurred lines." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAiodSTczlQQ8ajT6bDESjD_yrEgSfYg7opD9VWj-5vIWSV7H32zsC4xNrfa9Plq40qz_4_uBKyKUlCAoPWsJmMGSp29Kehx0AOIzMOfKUwA7Llaoo9NwpzlMp32etdF5uxLtYQ4QVae061xbLrfjS0qmhpInq7APIU67qb8UXFJqlfpeSlrmMq5RR63c4skIR5FIDs3l6mKbgLUKoiUCy2wIh4IUbZ7Jv1CdAhkrGp--g8vl1KypgyfIsQhMFOKPUrPLoFtiPRJ-vK"/>

<!-- Suppressed: This is a focused learning screen (Linear/Task-focused relative to global nav) with a 'Back' action in the TopAppBar, implying temporary departure from main nav flow. -->
<script>
        function handleAnswer(isCorrect, btnElement) {
            const feedbackEl = document.getElementById('feedback-message');
            const allButtons = btnElement.parentElement.querySelectorAll('button');
            
            // Reset buttons
            allButtons.forEach(btn => {
                btn.classList.remove('bg-error-container', 'bg-tertiary-fixed');
                btn.classList.add('bg-surface-container-lowest');
            });
            
            feedbackEl.classList.remove('hidden', 'bg-error-container', 'bg-tertiary-fixed', 'text-on-error-container', 'text-on-tertiary-fixed');
            
            if (isCorrect) {
                btnElement.classList.replace('bg-surface-container-lowest', 'bg-tertiary-fixed');
                feedbackEl.classList.add('bg-tertiary-fixed', 'text-on-tertiary-fixed');
                feedbackEl.innerHTML = "<strong>Sahi jawab! (Correct!)</strong> Point A is the starting point, so it is the Vertex.";
            } else {
                btnElement.classList.replace('bg-surface-container-lowest', 'bg-error-container');
                feedbackEl.classList.add('bg-error-container', 'text-on-error-container');
                feedbackEl.innerHTML = "<strong>Oops!</strong> A ray starts at exactly one point. Look at where the line begins.";
            }
        }
    </script>
