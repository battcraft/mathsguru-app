<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Decimal Duel - Kaun Bada?</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;800&amp;family=Nunito+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 1,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#006d38",
                        "primary-fixed-dim": "#ffb693",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dbdad4",
                        "on-tertiary-container": "#67002f",
                        "on-tertiary-fixed": "#3f001a",
                        "primary": "#a04100",
                        "on-secondary": "#ffffff",
                        "on-background": "#1b1c19",
                        "on-secondary-fixed-variant": "#005229",
                        "inverse-primary": "#ffb693",
                        "tertiary-fixed-dim": "#ffb1c4",
                        "on-error-container": "#93000a",
                        "surface-container": "#f0eee8",
                        "surface-bright": "#fbf9f3",
                        "surface-variant": "#e4e2dd",
                        "surface-tint": "#a04100",
                        "secondary-fixed": "#63ff9d",
                        "on-primary-fixed-variant": "#7a3000",
                        "on-surface-variant": "#5a4136",
                        "on-error": "#ffffff",
                        "background": "#fff8f0", /* Overridden per prompt off-white request */
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f2f1eb",
                        "tertiary-fixed": "#ffd9e1",
                        "surface-container-highest": "#e4e2dd",
                        "outline-variant": "#e2bfb0",
                        "primary-fixed": "#ffdbcc",
                        "on-tertiary-fixed-variant": "#8f0044",
                        "surface": "#fbf9f3",
                        "outline": "#8e7164",
                        "inverse-surface": "#30312d",
                        "on-secondary-fixed": "#00210d",
                        "on-primary-container": "#572000",
                        "secondary-fixed-dim": "#40e183",
                        "surface-container-low": "#f5f3ee",
                        "primary-container": "#ff6b00", /* Mango Orange approximation */
                        "tertiary-container": "#ff6096",
                        "secondary-container": "#63ff9d", /* Nimbu Green approximation */
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-container-high": "#eae8e2",
                        "tertiary": "#ba005b",
                        "on-primary-fixed": "#351000",
                        "on-surface": "#1b1c19",
                        "on-secondary-container": "#00743c",
                        "desiyellow": "#FFD700", /* Custom yellow for VS badge */
                        "desiteal": "#008080" /* Custom teal for numbers */
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "margin-desktop": "40px",
                        "gutter": "16px",
                        "unit": "8px",
                        "container-max-width": "1200px"
                    },
                    "fontFamily": {
                        "label-lg": ["Nunito Sans"],
                        "headline-md": ["Bricolage Grotesque"],
                        "body-md": ["Nunito Sans"],
                        "headline-lg-mobile": ["Bricolage Grotesque"],
                        "headline-xl-mobile": ["Bricolage Grotesque"],
                        "headline-xl": ["Bricolage Grotesque"],
                        "headline-lg": ["Bricolage Grotesque"],
                        "body-lg": ["Nunito Sans"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],

                        "headline-xl-mobile": ["36px", {"lineHeight": "1.1", "fontWeight": "800"}],
                        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],

                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "500"}]

                }
            }
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface antialiased overflow-x-hidden selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Top AppBar (Using JSON styling logic with overrides for prompt specifics) -->
<header class="bg-primary-container text-on-primary-container font-headline-md text-headline-md docked full-width top-0 border-b-[3px] border-black shadow-[4px_4px_0px_#1A1A1A] flex justify-between items-center w-full px-margin-mobile h-16 z-50 sticky top-0">
<div class="flex items-center gap-2">
<span class="font-extrabold tracking-tight">Decimal Duel ⚔️</span>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center bg-surface-container-lowest border-[3px] border-black rounded-full px-3 py-1 shadow-[2px_2px_0px_#1A1A1A]">
<span class="material-symbols-outlined text-[#FFD700] mr-1" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-lg text-label-lg text-on-surface">3/10</span>
</div>
<div class="flex items-center bg-[#FF4136] text-white border-[3px] border-black rounded-full px-3 py-1 shadow-[2px_2px_0px_#1A1A1A]">
<span class="material-symbols-outlined mr-1 text-[18px]">timer</span>
<span class="font-label-lg text-label-lg">02:45</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile py-8 gap-8 max-w-[600px] mx-auto w-full pb-28">
<!-- Instruction Card -->
<section class="bg-surface-container-lowest border-[3px] border-black rounded-DEFAULT p-6 shadow-[4px_4px_0px_#1A1A1A] transform transition-transform hover:-translate-y-1">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-center text-on-surface">Kaunsa bada hai? Tap karke batao! 🔍</h2>
</section>
<!-- Comparison Area -->
<section class="relative flex items-stretch justify-center gap-4 mt-4">
<!-- Left Card -->
<button class="flex-1 bg-surface-container-lowest border-[3px] border-black rounded-DEFAULT p-8 shadow-[4px_4px_0px_#1A1A1A] flex items-center justify-center active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all group">
<span class="font-headline-xl-mobile text-headline-xl-mobile text-desiteal group-hover:scale-110 transition-transform">3.75</span>
</button>
<!-- VS Badge -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 w-16 h-16 bg-desiyellow border-[3px] border-black rounded-full flex items-center justify-center shadow-[4px_4px_0px_#1A1A1A] rotate-[-10deg]">
<span class="font-headline-md text-headline-md font-extrabold text-on-surface">VS</span>
</div>
<!-- Right Card -->
<button class="flex-1 bg-surface-container-lowest border-[3px] border-black rounded-DEFAULT p-8 shadow-[4px_4px_0px_#1A1A1A] flex items-center justify-center active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all group">
<span class="font-headline-xl-mobile text-headline-xl-mobile text-primary-container group-hover:scale-110 transition-transform">3.9</span>
</button>
</section>
<!-- Selection Buttons -->
<section class="flex flex-col gap-4 mt-8">
<button class="w-full bg-secondary-container text-on-secondary-container border-[3px] border-black rounded-DEFAULT py-4 px-6 shadow-[4px_4px_0px_#1A1A1A] font-headline-md text-headline-md text-center active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all hover:brightness-105">
                Left Bada! ←
            </button>
<button class="w-full bg-primary-container text-on-primary-container border-[3px] border-black rounded-DEFAULT py-4 px-6 shadow-[4px_4px_0px_#1A1A1A] font-headline-md text-headline-md text-center active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all hover:brightness-105">
                Right Bada! →
            </button>
</section>
<!-- Progress Section -->
<section class="mt-4">
<div class="flex justify-between items-center mb-2">
<span class="font-label-lg text-label-lg text-on-surface-variant">Progress (3/10)</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">30%</span>
</div>
<div class="w-full h-6 border-[3px] border-black bg-surface-variant rounded-full overflow-hidden shadow-[inset_2px_2px_0px_rgba(0,0,0,0.1)]">
<div class="h-full bg-secondary-container border-r-[3px] border-black" style="width: 30%;">
<!-- Diagonal stripes for desi texture -->
<div class="w-full h-full opacity-20" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #000 10px, #000 20px);"></div>
</div>
</div>
</section>
<!-- Bottom Playful Text -->
<section class="mt-auto text-center">
<p class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Decimal ka duel! Kaun jeetega? 🏆</p>
</section>
</main>
<!-- BottomNavBar (Semantic Shell: Active intent is Quiz/Game) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-safe bg-surface-container-lowest h-20 border-t-[3px] border-black shadow-[0px_-4px_0px_#1A1A1A] md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-[28px]">home</span>
<span class="font-label-lg text-[12px] mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-[28px]">chat_bubble</span>
<span class="font-label-lg text-[12px] mt-1">Chat</span>
</button>
<!-- Active State: Quiz -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-lg p-2 border-[3px] border-black shadow-[2px_2px_0px_#1A1A1A] -translate-y-2">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-lg text-[12px] mt-1">Quiz</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-[28px]">auto_stories</span>
<span class="font-label-lg text-[12px] mt-1">Story</span>
</button>
</nav>
<!-- Subtle atmospheric JS effect for the active state card clicks -->
<script>
        document.querySelectorAll('button.group').forEach(btn => {
            btn.addEventListener('click', function() {
                const badge = document.querySelector('.bg-desiyellow');
                badge.style.transform = 'translate(-50%, -50%) scale(1.2) rotate(10deg)';
                setTimeout(() => {
                    badge.style.transform = 'translate(-50%, -50%) scale(1) rotate(-10deg)';
                }, 200);
            });
        });
    </script>
</body></html>
