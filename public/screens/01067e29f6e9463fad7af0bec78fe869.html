<style>
        .neo-brutalist-border {
            border: 3px solid #1A1A1A;
        }
        .neo-brutalist-shadow {
            box-shadow: 4px 4px 0px #1A1A1A;
        }
        .neo-brutalist-interactive:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px #1A1A1A;
        }
        .neo-brutalist-interactive:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #1A1A1A;
        }
        body {
            background-color: #fff8f0; /* warm-chalk */
        }

    body {
      min-height: max(884px, 100dvh);

<body class="text-on-surface font-body-md pb-[100px] md:pb-0">
<!-- TopAppBar -->
<header class="w-full top-0 border-b-[3px] border-on-surface dark:border-surface-container-highest shadow-[4px_4px_0px_#1B1C19] bg-mango-orange z-40 sticky">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max-width mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface text-3xl font-bold" style="font-variation-settings: 'FILL' 1;">timer</span>
<h1 class="font-headline-md text-headline-md font-extrabold text-on-surface uppercase tracking-tighter">Final Panga! 📝</h1>
</div>
<div class="flex items-center gap-4">
<span class="font-headline-md text-headline-md text-on-surface bg-auto-yellow px-4 py-1 rounded-full neo-brutalist-border">02:30</span>
<span class="font-headline-md text-headline-md text-on-surface font-bold">Score: 150</span>
</div>
</div>
</header>
<main class="max-w-container-max-width mx-auto px-margin-mobile md:px-margin-desktop py-8 flex flex-col gap-8">
<!-- Progress Bar -->
<div class="w-full">
<div class="flex justify-between mb-2">
<span class="font-label-lg text-label-lg uppercase">Question 1/10</span>
<span class="font-label-lg text-label-lg uppercase">10% Complete</span>
</div>
<div class="w-full bg-surface-container-highest rounded-full h-6 neo-brutalist-border overflow-hidden flex">
<div class="bg-nimbu-green h-full w-[10%] border-r-[3px] border-on-surface flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-20 bg-[repeating-linear-gradient(45deg,transparent,transparent_10px,#000_10px,#000_20px)]"></div>
</div>
<div class="h-full flex-1 relative">
<!-- Segment markers -->
<div class="absolute left-[10%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[20%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[30%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[40%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[50%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[60%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[70%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[80%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
<div class="absolute left-[90%] top-0 bottom-0 w-[3px] bg-on-surface/20"></div>
</div>
</div>
</div>
<!-- Main Question Card -->
<section class="bg-white rounded-DEFAULT neo-brutalist-border neo-brutalist-shadow p-6 md:p-8 flex flex-col gap-6">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg">Sabse zyada aur sabse kam price kaunsi hai? Max aur Min batao! 🔢</h2>
<hr class="border-t-[3px] border-on-surface my-2"/>
<!-- Price Tags -->
<div class="flex flex-wrap gap-4 justify-center py-4">
<div class="bg-auto-yellow px-6 py-3 rounded-full neo-brutalist-border neo-brutalist-shadow font-headline-md text-headline-md">₹12</div>
<div class="bg-auto-yellow px-6 py-3 rounded-full neo-brutalist-border neo-brutalist-shadow font-headline-md text-headline-md">₹45</div>
<div class="bg-auto-yellow px-6 py-3 rounded-full neo-brutalist-border neo-brutalist-shadow font-headline-md text-headline-md">₹8</div>
<div class="bg-auto-yellow px-6 py-3 rounded-full neo-brutalist-border neo-brutalist-shadow font-headline-md text-headline-md">₹67</div>
<div class="bg-auto-yellow px-6 py-3 rounded-full neo-brutalist-border neo-brutalist-shadow font-headline-md text-headline-md">₹23</div>
</div>
<!-- Input Area -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg uppercase">Max Value</label>
<input class="w-full bg-white neo-brutalist-border p-4 font-headline-md text-headline-md focus:outline-none focus:shadow-[4px_4px_0px_#006d38] transition-shadow rounded-DEFAULT text-center" placeholder="___" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg uppercase">Min Value</label>
<input class="w-full bg-white neo-brutalist-border p-4 font-headline-md text-headline-md focus:outline-none focus:shadow-[4px_4px_0px_#006d38] transition-shadow rounded-DEFAULT text-center" placeholder="___" type="text"/>
</div>
</div>
<!-- Quick Pick -->
<div class="flex flex-col items-center gap-3 mt-4 bg-surface-container p-4 rounded-DEFAULT neo-brutalist-border border-dashed">
<span class="font-label-lg text-label-lg uppercase tracking-widest text-on-surface-variant">Quick Pick</span>
<div class="flex gap-4">
<button class="bg-white border-[3px] border-mango-orange px-6 py-2 rounded-full font-headline-md text-headline-md neo-brutalist-interactive transition-all">₹67 (Max)</button>
<button class="bg-white border-[3px] border-mango-orange px-6 py-2 rounded-full font-headline-md text-headline-md neo-brutalist-interactive transition-all">₹8 (Min)</button>
</div>
</div>
</section>
<!-- Playful Tip -->
<div class="bg-[#00e5ff] rounded-DEFAULT neo-brutalist-border neo-brutalist-shadow p-4 flex items-center gap-4">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
<p class="font-body-lg text-body-lg font-bold">Final panga hai ye! Sabse bada aur sabse chhota dhoondh! 🏆</p>
</div>
<!-- Desktop Actions (Hidden on Mobile) -->
<div class="hidden md:flex justify-between items-center mt-8">
<div class="flex gap-4">
<button class="bg-white neo-brutalist-border neo-brutalist-shadow px-8 py-4 rounded-DEFAULT font-headline-md text-headline-md neo-brutalist-interactive transition-all flex items-center gap-2">
<span class="material-symbols-outlined">skip_next</span> Skip
                </button>
<button class="bg-white neo-brutalist-border neo-brutalist-shadow px-8 py-4 rounded-DEFAULT font-headline-md text-headline-md neo-brutalist-interactive transition-all flex items-center gap-2">
<span class="material-symbols-outlined">help</span> Hint
                </button>
</div>
<button class="bg-mango-orange neo-brutalist-border neo-brutalist-shadow px-12 py-4 rounded-DEFAULT font-headline-lg text-headline-lg neo-brutalist-interactive transition-all text-on-surface uppercase">
                SUBMIT PANGA
            </button>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-background dark:bg-surface border-t-[3px] border-on-surface dark:border-surface-container-highest">

</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant p-2 hover:bg-tertiary-container dark:hover:bg-tertiary active:scale-95 transition-transform w-1/3 border-l-[3px] border-on-surface">

</div>
<div class="flex flex-col items-center justify-center text-on-surface p-2 bg-mango-orange border-l-[3px] border-on-surface w-1/3 h-full">

</div>
