<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ganit Pop - Infinite Lines</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&amp;family=Nunito+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eeeeee",
                        "on-background": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#6f3800",
                        "surface-tint": "#b80069",
                        "primary-fixed": "#ffd9e3",
                        "secondary": "#924c00",
                        "surface-bright": "#f9f9f9",
                        "primary": "#b40067",
                        "on-primary-fixed-variant": "#8d004f",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-container": "#fffbff",
                        "secondary-container": "#f88400",
                        "outline": "#8d6f78",
                        "on-error": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#705d00",
                        "primary-fixed-dim": "#ffb0cb",
                        "on-tertiary-fixed": "#221b00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#5b2d00",
                        "on-primary-fixed": "#3e0020",
                        "on-tertiary-container": "#4c3f00",
                        "secondary-fixed": "#ffdcc4",
                        "inverse-primary": "#ffb0cb",
                        "secondary-fixed-dim": "#ffb781",
                        "surface-container-low": "#f3f3f4",
                        "background": "#f9f9f9",
                        "surface": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-surface-variant": "#5a3f48",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffe16d",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-secondary-fixed": "#2f1400",
                        "tertiary-fixed-dim": "#e9c400",
                        "surface-dim": "#dadada",
                        "outline-variant": "#e1bdc7",
                        "primary-container": "#df0b81",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f0f1f1",
                        "tertiary-container": "#c9a900"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "border-width": "3px",
                        "gutter": "16px",
                        "unit": "8px",
                        "shadow-offset": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Fredoka"],
                        "label-bold": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],
                        "headline-xl": ["Fredoka"],
                        "headline-md": ["Fredoka"],
                        "headline-xl-mobile": ["Fredoka"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],

                        "headline-xl-mobile": ["36px", { "lineHeight": "1.1", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Neo-brutalist pattern background */
        .bg-dot-pattern {
            background-image: radial-gradient(circle at 2px 2px, #dadada 1px, transparent 0);
            background-size: 32px 32px;
        }
        
        /* Custom animation for the infinite line */
        @keyframes flowLine {
            0% { background-position: 0 0; }
            100% { background-position: 200% 0; }
        }
        
        .animated-line {
            background: linear-gradient(90deg, #df0b81 0%, #f88400 50%, #df0b81 100%);
            background-size: 200% 100%;
            animation: flowLine 3s linear infinite;
        }
        
        /* Ensure no generic styles override the brutalis theme */
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-dot-pattern min-h-screen flex flex-col font-body-md pb-24 md:pb-0">
<!-- TopAppBar (Web & Mobile) -->
<header class="w-full sticky top-0 z-50 bg-surface border-b-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between px-margin-mobile py-unit transition-all">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center border-[3px] border-on-surface rounded bg-surface hover:bg-surface-variant shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all">
<span class="material-symbols-outlined text-primary font-bold">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary uppercase tracking-tighter">Ganit Pop</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas -->
<main class="flex-grow container mx-auto px-margin-mobile md:px-margin-desktop py-8 flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-8 max-w-2xl">
<div class="inline-block bg-tertiary-fixed border-[3px] border-on-surface px-4 py-1 rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] mb-4">
<span class="font-label-bold text-label-bold text-on-tertiary-fixed-variant uppercase tracking-widest">Concept Explainer</span>
</div>
<h2 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-surface mb-2">Infinite Lines</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant font-bold bg-primary-fixed border-[3px] border-on-surface p-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] inline-block transform -rotate-1">
                Endless traveler! No start, no end.
            </p>
</div>
<!-- Explainer Interactive Canvas -->
<div class="w-full max-w-4xl relative mb-12">
<!-- Neo-brutalist Container -->
<div class="bg-inverse-surface border-[3px] border-on-surface rounded-xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] overflow-hidden relative aspect-video flex items-center justify-center">
<!-- Space Background generated via image -->
<div class="absolute inset-0 z-0">
<img alt="Space background" class="w-full h-full object-cover opacity-80" data-alt="A deep space cosmic scene in a graphic novel illustration style. Dark navy blue void filled with scattered white stars and stylized glowing celestial bodies. A vibrant neo-brutalist aesthetic with high contrast, flat colors, and thick black outlines subtly integrated. The scene includes a few geometric planets in bold colors like bright yellow and neon pink. The mood is adventurous and educational." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDL3YrM9aYgPvo0ciZkEFabykpUl0lpuidcRmskgggu8xVqZBqsf1edkLyJJLFlOkUeIarH_pT4hMybFEtbGlru2XZhbw-dLcbQJPKmkmtXhkQbcVPJbxOsF0KmxXp6C4iyaAB-9wfheXyrIwqUrM_mGJ-R-dX_ZvT1BSwl8KjaZMq0H6Zakt6rn4vXOUM3_tuodjn4npK2yXRvLDlWof4zbv1r3Xk_s6l8xPE3eiGLaxigEJgUqlMAScfHlde_smMypu72hB5nOdpB"/>
</div>
<!-- The Infinite Line -->
<div class="absolute left-0 right-0 h-[6px] animated-line border-y-[3px] border-on-surface z-10 shadow-[0_0_15px_rgba(223,11,129,0.8)]"></div>
<!-- Arrow Heads -->
<div class="absolute left-4 z-20 bg-surface border-[3px] border-on-surface w-10 h-10 flex items-center justify-center rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-bounce" style="animation-direction: alternate; animation-duration: 1s;">
<span class="material-symbols-outlined text-primary font-bold">arrow_back</span>
</div>
<div class="absolute right-4 z-20 bg-surface border-[3px] border-on-surface w-10 h-10 flex items-center justify-center rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-bounce" style="animation-direction: alternate-reverse; animation-duration: 1.1s;">
<span class="material-symbols-outlined text-primary font-bold">arrow_forward</span>
</div>
<!-- Celestial Bodies / Points -->
<div class="absolute left-1/4 z-10 -translate-y-1/2 mt-1">
<div class="w-16 h-16 bg-secondary-container border-[3px] border-on-surface rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">public</span>
</div>
<div class="bg-surface border-[3px] border-on-surface px-2 py-1 mt-2 text-center rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] absolute -left-4 w-24">
<span class="font-label-bold text-label-bold text-on-surface">Point A</span>
</div>
</div>
<div class="absolute right-1/4 z-10 -translate-y-1/2 mt-1">
<div class="w-12 h-12 bg-tertiary-container border-[3px] border-on-surface rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container">dark_mode</span>
</div>
<div class="bg-surface border-[3px] border-on-surface px-2 py-1 mt-2 text-center rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] absolute -left-4 w-24">
<span class="font-label-bold text-label-bold text-on-surface">Point B</span>
</div>
</div>
</div>
<!-- Floating Factoid -->
<div class="absolute -bottom-6 right-4 md:right-12 bg-surface-bright border-[3px] border-on-surface p-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform rotate-2 max-w-xs z-30">
<div class="flex items-start gap-2">
<span class="material-symbols-outlined text-primary font-bold text-[32px]">lightbulb</span>
<p class="font-body-md text-body-md text-on-surface">
                        A line goes right through points, traveling forever in both directions. It never stops!
                    </p>
</div>
</div>
</div>
<!-- Action / Quiz Prompt -->
<div class="w-full max-w-lg mt-8">
<button class="w-full bg-primary border-[3px] border-on-surface text-on-primary font-headline-md text-headline-md py-4 px-6 rounded-lg shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center gap-3 group">
<span class="material-symbols-outlined font-bold group-hover:rotate-12 transition-transform">rocket_launch</span>
                Next: Draw a Line
            </button>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<!-- Note: Suppressed because this is a specific learning module/task screen with a 'Back' action in the TopAppBar, implying a temporary departure from the main flow. -->
</body></html>
