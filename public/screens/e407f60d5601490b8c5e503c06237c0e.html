<script>
        // Simple micro-interaction: Add a slight shake effect to price tags when they are clicked to emphasize the Neo-Brutalist "physical" feel.
        document.querySelectorAll('.font-headline-lg-mobile').forEach(tag => {
            tag.addEventListener('click', (e) => {
                e.stopPropagation(); // prevent triggering the parent card click
                tag.style.transform = 'translate(2px, 2px)';
                tag.style.boxShadow = '0px 0px 0px 0px rgba(0,0,0,1)';
                setTimeout(() => {
                    tag.style.transform = '';
                    tag.style.boxShadow = '2px 2px 0px 0px rgba(0,0,0,1)';
                }, 150);
            });
        });
