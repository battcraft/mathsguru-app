<script>
        // Simple JS for radio button interaction feedback
        document.querySelectorAll('input[name="quiz_option"]').forEach(radio => {
            radio.addEventListener('change', function() {
                // Remove check icon from all
                document.querySelectorAll('.material-symbols-outlined.check-icon').forEach(icon => icon.remove());
                
                if (this.checked) {
                    const labelDiv = this.nextElementSibling;
                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'material-symbols-outlined check-icon text-on-surface font-bold ml-auto';
                    iconSpan.textContent = 'check_circle';
                    iconSpan.style.fontVariationSettings = "'FILL' 1";
                    labelDiv.appendChild(iconSpan);
                }
            });
        });
