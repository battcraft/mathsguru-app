<script>
        // Simple timer logic for visual flair
        let timeRemaining = 150; // 2:30 in seconds
        const timerDisplay = document.getElementById('timerDisplay');

        const interval = setInterval(() => {
            timeRemaining--;
            if(timeRemaining <= 0) {
                clearInterval(interval);
                timerDisplay.textContent = "00:00";
                return;
            }
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Pulse effect when time is low
            if(timeRemaining < 30) {
                timerDisplay.parentElement.classList.add('animate-pulse');
            }
        }, 1000);

        // Optional interaction feedback for buttons (currently hardcoded visually to 67 being selected)
        const optionBtns = document.querySelectorAll('.option-btn');
        optionBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove selected state from all
                optionBtns.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container');
                    b.classList.add('bg-surface-container');
                    const indicator = b.querySelector('span:last-child');
                    indicator.className = 'w-6 h-6 rounded-full border-2 border-on-surface group-focus:bg-primary-container';
                    indicator.innerHTML = '';
                });
                
                // Add selected state to clicked
                this.classList.remove('bg-surface-container');
                this.classList.add('bg-primary-container', 'text-on-primary-container');
                const indicator = this.querySelector('span:last-child');
                indicator.className = 'w-6 h-6 rounded-full border-2 border-on-surface bg-on-surface flex items-center justify-center';
                indicator.innerHTML = '<span class="material-symbols-outlined text-surface text-sm" style="font-variation-settings: \'FILL\' 1;">check</span>';
            });
        });
