<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Max/Min: Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&amp;family=Nunito+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-container": "#572000",
                        "outline-variant": "#e2bfb0",
                        "on-surface": "#1b1c19",
                        "tertiary-container": "#ff6096",
                        "primary-container": "#ff6b00",
                        "outline": "#8e7164",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#40e183",
                        "surface-tint": "#a04100",
                        "error-container": "#ffdad6",
                        "on-background": "#1b1c19",
                        "inverse-surface": "#30312d",
                        "primary-fixed": "#ffdbcc",
                        "inverse-on-surface": "#f2f1eb",
                        "tertiary-fixed-dim": "#ffb1c4",
                        "on-secondary-fixed": "#00210d",
                        "surface-container-high": "#eae8e2",
                        "on-tertiary-fixed-variant": "#8f0044",
                        "secondary-fixed": "#63ff9d",
                        "surface": "#fbf9f3",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#67002f",
                        "on-tertiary-fixed": "#3f001a",
                        "surface-container": "#f0eee8",
                        "surface-container-low": "#f5f3ee",
                        "secondary-container": "#63ff9d",
                        "surface-variant": "#e4e2dd",
                        "on-primary-fixed-variant": "#7a3000",
                        "tertiary-fixed": "#ffd9e1",
                        "surface-bright": "#fbf9f3",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e4e2dd",
                        "secondary": "#006d38",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#5a4136",
                        "on-primary-fixed": "#351000",
                        "primary-fixed-dim": "#ffb693",
                        "surface-dim": "#dbdad4",
                        "tertiary": "#ba005b",
                        "background": "#fbf9f3",
                        "primary": "#a04100",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#005229",
                        "on-secondary-container": "#00743c",
                        "inverse-primary": "#ffb693",
                        "shadow-color": "#1A1A1A"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Bricolage Grotesque", "sans-serif"],
                        "body": ["Nunito Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .neo-brutalism-card {
            border: 3px solid #1A1A1A;
            box-shadow: 4px 4px 0px #1A1A1A;
            transition: all 0.1s ease;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .skeleton-shimmer {
            background: linear-gradient(90deg, #f0eee8 25%, #eae8e2 50%, #f0eee8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes spin-bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .loader-icon {
            animation: spin-bounce 1s infinite ease-in-out;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Header Section (Process Screen - Minimal Navigation) -->
<header class="p-5 flex items-center justify-between bg-surface border-b-3 border-[#1A1A1A]">
<button class="neo-brutalism-card bg-surface-container-lowest p-2 flex items-center justify-center rounded-xl active:translate-x-1 active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline text-headline-md text-center">Max/Min: Loading...</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-grow flex flex-col items-center justify-center p-gutter max-w-container-max-width mx-auto w-full">
<!-- Animated Loader -->
<div class="mb-10 flex flex-col items-center">
<div class="neo-brutalism-card bg-primary p-6 rounded-full w-24 h-24 flex items-center justify-center mb-6 loader-icon">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h2 class="font-headline text-headline-lg-mobile md:text-headline-lg text-center px-4">
                Thoda ruko boss, content pak raha hai...
            </h2>
<p class="text-on-surface-variant font-medium mt-2">Stirring the math curry for you!</p>
</div>
<!-- Skeleton Content Grid -->
<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-8 px-margin-mobile">
<!-- Skeleton Card 1 -->
<div class="neo-brutalism-card bg-surface-container-lowest p-6 rounded-xl space-y-4">
<div class="w-full aspect-video rounded-lg skeleton-shimmer border-2 border-[#1A1A1A]"></div>
<div class="h-8 w-3/4 rounded-md skeleton-shimmer"></div>
<div class="space-y-2">
<div class="h-4 w-full rounded-md skeleton-shimmer"></div>
<div class="h-4 w-5/6 rounded-md skeleton-shimmer"></div>
</div>
<div class="pt-4 flex gap-3">
<div class="h-10 w-24 rounded-full skeleton-shimmer border-2 border-[#1A1A1A]"></div>
<div class="h-10 w-24 rounded-full skeleton-shimmer border-2 border-[#1A1A1A]"></div>
</div>
</div>
<!-- Skeleton Card 2 -->
<div class="neo-brutalism-card bg-surface-container-lowest p-6 rounded-xl space-y-4">
<div class="w-full aspect-video rounded-lg skeleton-shimmer border-2 border-[#1A1A1A]"></div>
<div class="h-8 w-2/3 rounded-md skeleton-shimmer"></div>
<div class="space-y-2">
<div class="h-4 w-full rounded-md skeleton-shimmer"></div>
<div class="h-4 w-4/5 rounded-md skeleton-shimmer"></div>
</div>
<div class="pt-4 flex gap-3">
<div class="h-10 w-32 rounded-xl skeleton-shimmer border-2 border-[#1A1A1A]"></div>
</div>
</div>
<!-- Skeleton Card 3 (Hidden on mobile for cleaner load) -->
<div class="hidden md:block neo-brutalism-card bg-surface-container-lowest p-6 rounded-xl space-y-4">
<div class="w-full aspect-video rounded-lg skeleton-shimmer border-2 border-[#1A1A1A]"></div>
<div class="h-8 w-1/2 rounded-md skeleton-shimmer"></div>
<div class="space-y-2">
<div class="h-4 w-full rounded-md skeleton-shimmer"></div>
</div>
</div>
<!-- Skeleton Card 4 (Hidden on mobile) -->
<div class="hidden md:block neo-brutalism-card bg-surface-container-lowest p-6 rounded-xl space-y-4">
<div class="w-full aspect-video rounded-lg skeleton-shimmer border-2 border-[#1A1A1A]"></div>
<div class="h-8 w-3/4 rounded-md skeleton-shimmer"></div>
<div class="space-y-2">
<div class="h-4 w-5/6 rounded-md skeleton-shimmer"></div>
</div>
</div>
</div>
<!-- Progress Indicator (Segmented Neo-Brutalist Style) -->
<div class="w-full max-w-md px-margin-mobile mt-12 mb-8">
<div class="flex justify-between mb-2">
<span class="label-lg text-primary uppercase">Fueling Up</span>
<span class="label-lg text-on-surface">65%</span>
</div>
<div class="h-6 w-full bg-surface-container-high border-3 border-[#1A1A1A] rounded-full overflow-hidden flex">
<div class="h-full bg-secondary border-r-2 border-[#1A1A1A]" style="width: 20%;"></div>
<div class="h-full bg-secondary border-r-2 border-[#1A1A1A]" style="width: 20%;"></div>
<div class="h-full bg-secondary border-r-2 border-[#1A1A1A]" style="width: 25%;"></div>
<div class="h-full bg-surface-container-high" style="width: 35%;"></div>
</div>
</div>
</main>
<!-- Shared Component: BottomNavBar (Destination logic - Excluded as this is a process/loading view) -->
<!-- However, based on the Hierarchy of Focus, if this transition eventually lands on a destination, 
         we keep the structure ready. For now, we follow Rule 2: Explicit Exclusion for Focused Views. -->
<footer class="p-gutter text-center border-t-3 border-[#1A1A1A] bg-surface-container-low">
<p class="text-label-lg text-on-surface-variant italic">Tip: Practice makes you the 'Asli Boss' of Algebra!</p>
</footer>
<script>
        // Micro-interaction for the back button
        document.querySelector('button').addEventListener('click', () => {
            window.history.back();
        });

        // Atmospheric effect: random playful messages during loading
        const messages = [
            "Thoda ruko boss, content pak raha hai...",
            "Calculations are doing a bhangra dance...",
            "Simmering the formulas for maximum flavour...",
            "Adding a pinch of logic and a lot of tadka...",
            "Almost there! The math-samosa is frying..."
        ];
        
        const heading = document.querySelector('h2');
        let index = 0;

        setInterval(() => {
            heading.style.opacity = '0';
            setTimeout(() => {
                index = (index + 1) % messages.length;
                heading.innerText = messages[index];
                heading.style.opacity = '1';
            }, 300);
        }, 3000);
    </script>
</body></html>
