<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&amp;family=Nunito+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Grid Canvas Background */
        body {
            background-color: #f9f9f9;
            background-image: 
                radial-gradient(#dadada 2px, transparent 2px);
            background-size: 32px 32px;
        }

        /* Brutalist Shadows & Interactions */
        .brutal-border { border: 3px solid #1a1c1c; }
        .brutal-shadow { box-shadow: 4px 4px 0px #1a1c1c; }
        .brutal-shadow-lg { box-shadow: 8px 8px 0px #1a1c1c; }
        .brutal-interactive {
            transition: all 0.2s ease;
        }
        .brutal-interactive:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #1a1c1c;
        }
        .brutal-interactive:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #1a1c1c;
        }

        /* specific geometry point style */
        .geo-point {
            width: 24px; /* Slightly larger for tap target */
            height: 24px;
            border-radius: 9999px;
            border: 3px solid #1a1c1c;
            background-color: #b40067; /* Primary */
            position: absolute;
            cursor: pointer;
            transform: translate(-50%, -50%); /* Center on coordinates */
        }
        .geo-point.found {
            background-color: #c9a900; /* Auto yellow when found */
            box-shadow: 0 0 0 4px rgba(201, 169, 0, 0.3);
            animation: pulse 1s ease;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.5); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { display: none; }
    </style>

      min-height: max(884px, 100dvh);

<body class="text-on-surface selection:bg-tertiary-container selection:text-on-tertiary-container antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar Shared Component -->
<header class="bg-surface text-primary font-headline-md text-headline-md w-full top-0 sticky border-b-[3px] border-on-surface shadow-[4px_4px_0px_#1B1C19] flex justify-between items-center px-margin-mobile py-4 z-50">
<button class="brutal-interactive p-1 bg-surface-container-lowest brutal-border brutal-shadow rounded flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="flex-1 text-center font-bold tracking-tight">Geometry: Rekha &amp; Bindu</h1>
<div class="brutal-interactive p-1 px-3 bg-tertiary-container brutal-border brutal-shadow rounded-full flex items-center justify-center text-on-surface font-label-bold text-label-bold">
            5 🔥
        </div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] flex-1 flex flex-col p-margin-mobile gap-6 md:p-margin-desktop md:gap-8 overflow-x-hidden">
<!-- Header & Progress Section -->
<section class="flex flex-col gap-4">
<div class="flex items-end justify-between">
<div>
<h2 class="font-headline-xl-mobile text-headline-xl-mobile md:font-headline-xl md:text-headline-xl text-on-surface leading-none drop-shadow-[2px_2px_0px_#fff]">Bindu dhundo!</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1 bg-surface-container-lowest inline-block px-2 py-1 brutal-border shadow-[2px_2px_0px_#1a1c1c]">Find 5 hidden points</p>
</div>
</div>
<!-- Progress Bar Neo-Brutalist Style -->
<div class="w-full bg-surface-container-lowest brutal-border brutal-shadow h-10 relative overflow-hidden flex items-center p-1">
<!-- Progress Fill -->
<div class="h-full bg-tertiary-container border-r-[3px] border-on-surface transition-all duration-500 ease-out flex items-center justify-end px-2" id="progress-fill" style="width: 60%;">
<!-- Striped overlay pattern for the fill -->
<div class="absolute inset-0 opacity-20" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #000 10px, #000 20px);"></div>
</div>
<!-- Progress Text Overlay -->
<span class="absolute left-1/2 -translate-x-1/2 font-label-bold text-label-bold text-on-surface bg-surface-container-lowest px-2 py-0.5 brutal-border z-10" id="progress-text">3 / 5 Found</span>
</div>
</section>
<!-- Game Canvas Container -->
<section class="relative w-full aspect-[4/5] bg-surface-container-lowest brutal-border brutal-shadow-lg overflow-hidden group">
<!-- The Illustration -->
<img alt="A highly detailed, neo-brutalist style illustration of an urban Indian street scene designed as a hidden object game canvas. The art style mixes blueprint-like architectural lines with vibrant graffiti elements on concrete walls. Key interactive elements include a geometric kite caught in wires, a stylized bird resting on a balcony, and a mathematical star painted on a billboard. The color palette features high-contrast heavy black outlines, pristine white areas, bold Gulabi pinks, and bright Auto yellows. The overall mood is energetic, tactile, and slightly chaotic, suited for a youthful math app interface." class="w-full h-full object-cover object-center filter contrast-125 saturate-150 group-hover:scale-105 transition-transform duration-700 pointer-events-none" data-alt="A highly detailed, neo-brutalist style illustration of an urban Indian street scene designed as a hidden object game canvas. The art style mixes blueprint-like architectural lines with vibrant graffiti elements on concrete walls. Key interactive elements include a geometric kite caught in wires, a stylized bird resting on a balcony, and a mathematical star painted on a billboard. The color palette features high-contrast heavy black outlines, pristine white areas, bold Gulabi pinks, and bright Auto yellows. The overall mood is energetic, tactile, and slightly chaotic, suited for a youthful math app interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuADdFJeESuTu_l940tUWrYKgLLUNgyvAF7oMUdOqyyLT2zF413yrgW5WIptyTX7tL8D6SOgPJO6mGRgpCKGRk1KmC9pyDaRWZnVRRdan6Ex6Hgl0O60CWtDnVu6y_Vt9AjsKV5ez9xG1WszIBAkoltifBnOn-9y1KQHV4dmseR9R1drwNRvoJadUn8DvxxJ2drCX_akYqXAs7DsRr-u6VYnRROtlncST6yocSTtX-MmWGoWe_RVq2bslpAkX62eU4_1m7qn45gQKFSe"/>
<!-- Hotspots (The 'Points') -->
<!-- Point 1: Kite Tip (Found) -->
<button aria-label="Point found on kite tip" class="geo-point found brutal-interactive" style="top: 25%; left: 60%;"></button>
<!-- Point 2: Bird Eye (Found) -->
<button aria-label="Point found on bird" class="geo-point found brutal-interactive" style="top: 45%; left: 30%;"></button>
<!-- Point 3: Star Center (Found) -->
<button aria-label="Point found on star" class="geo-point found brutal-interactive" style="top: 15%; left: 80%;"></button>
<!-- Point 4: Unfound -->
<button aria-label="Hidden point" class="geo-point brutal-interactive" onclick="markFound(this)" style="top: 75%; left: 20%;"></button>
<!-- Point 5: Unfound -->
<button aria-label="Hidden point" class="geo-point brutal-interactive" onclick="markFound(this)" style="top: 60%; left: 75%;"></button>
<!-- Scanner Overlay Effect (Subtle) -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-[rgba(201,169,0,0.1)] to-transparent h-[200%] w-full animate-[scan_4s_ease-in-out_infinite] pointer-events-none"></div>
</section>
<!-- Hint Box -->
<section class="bg-primary-container text-on-primary-container p-4 brutal-border brutal-shadow flex items-start gap-4 mt-auto">
<div class="bg-surface-container-lowest text-primary p-2 brutal-border rounded-full flex-shrink-0 shadow-[2px_2px_0px_#1a1c1c]">
<span class="material-symbols-outlined" data-icon="lightbulb" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-surface-bright mb-1">Hint / Ishara</h3>
<p class="font-body-md text-body-md text-on-primary-container bg-black/10 inline-block px-2 py-1 rounded">Neeche scooter ke tyre ke center mein dekho!</p>
</div>
</section>
</main>
<style>
        @keyframes scan {
            0% { transform: translateY(-50%); }
            50% { transform: translateY(0%); }
            100% { transform: translateY(-50%); }
        }
    </style>
<script>
        let foundCount = 3;
        const totalCount = 5;
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');

        function markFound(btn) {
            if (btn.classList.contains('found')) return;
            
            btn.classList.add('found');
            foundCount++;
            
            // Update Progress UI
            const percentage = (foundCount / totalCount) * 100;
            progressFill.style.width = `${percentage}%`;
            progressText.innerText = `${foundCount} / ${totalCount} Found`;

            // Simple win state check
            if (foundCount === totalCount) {
                setTimeout(() => {
                    progressText.innerText = "All Points Found! 🎉";
                    progressFill.classList.replace('bg-tertiary-container', 'bg-primary');
                }, 500);
            }
        }
    </script>
</body></html>
