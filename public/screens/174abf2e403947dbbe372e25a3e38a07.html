<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 bg-surface z-50 fixed top-0 border-b-[3px] border-on-background shadow-[0px_4px_0px_0px_rgba(0,0,0,1)] md:px-margin-desktop md:h-20">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-all text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="sports_kabaddi">sports_kabaddi</span>
</button>
<h1 class="font-headline-md text-headline-md font-extrabold text-primary uppercase tracking-tighter">Decimal Duel</h1>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-all text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-20 pb-24 md:pt-28 md:pb-12 px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto w-full flex flex-col items-center gap-md">
<!-- Header Tracker & Timer -->
<div class="w-full max-w-3xl flex flex-col gap-xs bg-surface-container-high border-[3px] border-on-background p-sm rounded-DEFAULT shadow-[4px_4px_0px_0px_#1b1c19]">
<div class="flex justify-between items-center font-label-bold text-label-bold uppercase tracking-wide">
<span>Wins: <span class="text-primary-container">5</span></span>
<span>Losses: <span class="text-error">2</span></span>
</div>
<!-- Progress Bar Timer -->
<div class="w-full h-4 border-[3px] border-on-background rounded-full overflow-hidden bg-surface-variant relative">
<div class="absolute top-0 left-0 h-full bg-primary-container w-[70%]"></div>
</div>
</div>
<!-- Hero Visual Area -->
<div class="w-full max-w-3xl relative mt-sm">
<div class="rounded-DEFAULT border-[3px] border-on-background shadow-[8px_8px_0px_0px_#1b1c19] overflow-hidden bg-surface-container-highest">
<img alt="Two animated warriors facing off in an arena setting" class="w-full h-64 md:h-[400px] object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAA30JLg7YulU03vLtkr94nx_P1ThpvcvlNEiNl1z5Gj4KnmNxmw5lqOkavQv__gSk2BmFio8afWKVa-XJvG9BGm3_OBRKAGgVh8IGb-ZFri5gBN4fwPcD5V1YJPzOREwbFQR5qm425LBXsH_qrZkQPBEtK52qUba-sbbpYGNO1gI2uSeTDvjnUwZtjk8o2_3n8BI2UfQ1V7uxBhwCv_pCNuQ1GKw7SHFMwKxcxmpc1jjAFKyDmae47jV6nKAv0zN-QeKab7JXlJ6Pv"/>
</div>
<!-- Badge overlay -->
<div class="absolute -bottom-6 left-1/2 -translate-x-1/2 bg-surface-variant border-[3px] border-on-background shadow-[4px_4px_0px_0px_#1b1c19] rounded-full px-md py-sm rotate-[-3deg] z-10 whitespace-nowrap">
<span class="font-label-bold text-label-bold text-on-surface-variant">Kaun jeetega decimal ka mahayuddh?</span>
</div>
</div>
<!-- Duel Numbers -->
<div class="flex w-full max-w-3xl justify-between items-center mt-xl px-xs md:px-lg gap-sm">
<!-- Left Number (Mango Orange) -->
<div class="flex-1 bg-primary-container border-[3px] border-on-background rounded-DEFAULT shadow-[6px_6px_0px_0px_#1b1c19] flex items-center justify-center py-md md:py-xl transform -rotate-2">
<span class="font-headline-xl text-headline-xl text-on-primary-container">7.8</span>
</div>
<!-- VS Spacer (Optional visual element) -->
<div class="hidden md:flex flex-col items-center justify-center font-headline-sm text-headline-sm text-outline px-sm">
<span>VS</span>
</div>
<!-- Right Number (Gulabi Pink) -->
<div class="flex-1 bg-secondary-container border-[3px] border-on-background rounded-DEFAULT shadow-[6px_6px_0px_0px_#1b1c19] flex items-center justify-center py-md md:py-xl transform rotate-2">
<span class="font-headline-xl text-headline-xl text-on-secondary-container">7.85</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-center items-center gap-sm md:gap-md mt-lg w-full max-w-2xl">
<button class="w-20 h-20 md:w-24 md:h-24 bg-surface border-[3px] border-on-background rounded-lg shadow-[4px_4px_0px_0px_#1b1c19] flex items-center justify-center hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_#1b1c19] hover:bg-primary-container active:translate-y-1 active:shadow-[2px_2px_0px_0px_#1b1c19] transition-all group">
<span class="font-headline-lg text-headline-lg group-hover:text-on-primary-container transition-colors">&lt;</span>
</button>
<button class="w-20 h-20 md:w-24 md:h-24 bg-surface border-[3px] border-on-background rounded-lg shadow-[4px_4px_0px_0px_#1b1c19] flex items-center justify-center hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_#1b1c19] hover:bg-primary-container active:translate-y-1 active:shadow-[2px_2px_0px_0px_#1b1c19] transition-all group">
<span class="font-headline-lg text-headline-lg group-hover:text-on-primary-container transition-colors">=</span>
</button>
<button class="w-20 h-20 md:w-24 md:h-24 bg-surface border-[3px] border-on-background rounded-lg shadow-[4px_4px_0px_0px_#1b1c19] flex items-center justify-center hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_#1b1c19] hover:bg-primary-container active:translate-y-1 active:shadow-[2px_2px_0px_0px_#1b1c19] transition-all group">
<span class="font-headline-lg text-headline-lg group-hover:text-on-primary-container transition-colors">&gt;</span>
</button>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface border-t-[3px] border-on-background rounded-t-lg shadow-[0px_-4px_0px_0px_rgba(0,0,0,1)] md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 px-3 hover:text-secondary transition-all">
<span class="material-symbols-outlined mb-1" data-icon="swords">swords</span>
<span class="font-label-bold text-label-bold">Arena</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-sm border-2 border-on-background py-1 px-3 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] scale-95 transition-transform duration-100">
<span class="material-symbols-outlined mb-1" data-icon="fitness_center">fitness_center</span>
<span class="font-label-bold text-label-bold">Training</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 px-3 hover:text-secondary transition-all">
<span class="material-symbols-outlined mb-1" data-icon="military_tech">military_tech</span>
<span class="font-label-bold text-label-bold">Rankings</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant py-1 px-3 hover:text-secondary transition-all">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-bold text-label-bold">Profile</span>
</button>
</nav>
</body></html>
