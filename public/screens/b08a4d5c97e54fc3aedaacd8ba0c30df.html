<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mastery Summary</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config from Guidance -->
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#eeeeee",

                        "primary-fixed": "#ffd9e3",
                        "secondary": "#924c00",
                        "surface-bright": "#f9f9f9",
                        "primary": "#b40067",
                        "on-primary-fixed-variant": "#8d004f",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-container": "#fffbff",
                        "secondary-container": "#f88400",
                        "outline": "#8d6f78",
                        "on-error": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#705d00",
                        "primary-fixed-dim": "#ffb0cb",
                        "on-tertiary-fixed": "#221b00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#5b2d00",
                        "on-primary-fixed": "#3e0020",
                        "on-tertiary-container": "#4c3f00",
                        "secondary-fixed": "#ffdcc4",
                        "inverse-primary": "#ffb0cb",
                        "secondary-fixed-dim": "#ffb781",
                        "surface-container-low": "#f3f3f4",
                        "background": "#f9f9f9",
                        "surface": "#f9f9f9",

                        "surface-dim": "#dadada",
                        "outline-variant": "#e1bdc7",
                        "primary-container": "#df0b81",

                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    },
                    spacing: {
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "border-width": "3px",
                        "gutter": "16px",
                        "unit": "8px",
                        "shadow-offset": "4px"
                    },
                    fontFamily: {
                        "headline-lg": ["Fredoka"],
                        "label-bold": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],
                        "headline-xl": ["Fredoka"],
                        "headline-md": ["Fredoka"],
                        "headline-xl-mobile": ["Fredoka"]
                    },
                    fontSize: {
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "600" }],

                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],

                        "headline-xl-mobile": ["36px", { lineHeight: "1.1", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Neo-Brutalist Dot Grid Background */
        body {
            background-color: theme('colors.surface');
            background-image: radial-gradient(theme('colors.surface-dim') 2px, transparent 2px);
            background-size: 32px 32px;
            background-position: 0 0;
        }
        
        /* Utility for brutalist shadows to ensure color consistency */
        .shadow-brutal {
            box-shadow: 4px 4px 0px 0px theme('colors.on-surface');
        }
        .shadow-brutal-hover:hover {
            box-shadow: 8px 8px 0px 0px theme('colors.on-surface');
            transform: translate(-4px, -4px);
        }
        .shadow-brutal-active:active {
            box-shadow: 0px 0px 0px 0px theme('colors.on-surface');
            transform: translate(4px, 4px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col text-on-surface font-body-md overflow-x-hidden">
<!-- TopAppBar Component (from JSON) -->
<!-- Note: BottomNavBar is SUPPRESSED as this is a transactional "Success/Summary" screen -->
<header class="bg-surface dark:bg-surface-dim w-full sticky top-0 z-50 border-b-[3px] border-on-surface dark:border-on-surface-variant shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between px-margin-mobile py-unit w-full transition-all">
<button class="hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-transform flex items-center justify-center p-2 rounded-full border-border-width border-transparent hover:border-on-surface">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed text-[28px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed uppercase tracking-tighter">Ganit Pop</h1>
<div class="w-[44px]"></div> <!-- Spacer to balance flex-between -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-8 md:py-12 gap-8 max-w-4xl mx-auto w-full">
<!-- Hero/Headline Section -->
<div class="relative w-full text-center group cursor-default">
<!-- Decorative geometric shapes behind headline -->
<div class="absolute -top-6 -left-4 w-12 h-12 bg-tertiary-fixed rounded-full border-border-width border-on-surface shadow-brutal z-0"></div>
<div class="absolute -bottom-4 -right-2 w-16 h-16 bg-primary-container transform rotate-12 border-border-width border-on-surface shadow-brutal z-0"></div>
<div class="relative z-10 bg-surface-container-lowest border-border-width border-on-surface p-6 md:p-10 shadow-brutal transform transition-transform hover:rotate-1">
<span class="inline-block px-3 py-1 bg-surface-variant border-border-width border-on-surface font-label-bold text-label-bold uppercase tracking-wide mb-4 shadow-brutal">
                    Intermediate Geometry
                </span>
<h2 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-surface">
                    Geometry Guru Ban Gaye!
                </h2>
</div>
</div>
<!-- Badges Earned Section -->
<div class="w-full mt-4">
<h3 class="font-headline-md text-headline-md text-center mb-6 relative inline-block mx-auto w-full">
<span class="bg-surface px-4 relative z-10">Badges Earned</span>
<div class="absolute top-1/2 left-0 w-full h-[3px] bg-on-surface -z-0"></div>
</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-2xl mx-auto">
<!-- Badge 1: Ruler Pro -->
<div class="bg-primary-fixed border-border-width border-on-surface p-6 flex flex-col items-center justify-center gap-4 shadow-brutal shadow-brutal-hover transition-all">
<div class="w-20 h-20 bg-surface-container-lowest border-border-width border-on-surface rounded-full flex items-center justify-center shadow-[inset_4px_4px_0px_0px_rgba(26,28,28,0.1)]">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="straighten" data-weight="fill" style="font-variation-settings: 'FILL' 1;">straighten</span>
</div>
<div class="text-center">
<h4 class="font-headline-md text-headline-md">Ruler Pro</h4>
<p class="font-body-md text-body-md mt-1 opacity-80">Precision Master</p>
</div>
</div>
<!-- Badge 2: Symbol Star -->
<div class="bg-tertiary-fixed border-border-width border-on-surface p-6 flex flex-col items-center justify-center gap-4 shadow-brutal shadow-brutal-hover transition-all">
<div class="w-20 h-20 bg-surface-container-lowest border-border-width border-on-surface rounded-full flex items-center justify-center shadow-[inset_4px_4px_0px_0px_rgba(26,28,28,0.1)]">
<span class="material-symbols-outlined text-tertiary-container text-5xl" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="text-center">
<h4 class="font-headline-md text-headline-md">Symbol Star</h4>
<p class="font-body-md text-body-md mt-1 opacity-80">Notation Expert</p>
</div>
</div>
</div>
</div>
<!-- CTA Section -->
<div class="w-full flex justify-center mt-8">
<button class="bg-secondary-container text-on-secondary-container border-border-width border-on-surface px-8 md:px-12 py-4 font-headline-md text-headline-md shadow-brutal shadow-brutal-hover shadow-brutal-active flex items-center gap-3">
                Next Level: Expert
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
