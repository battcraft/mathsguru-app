<style>

        @keyframes float {

            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }

            animation: flipIn 0.6s ease-out forwards;

<script>
        function handleAnswer(btn, isCorrect) {
            // Reset all buttons
            document.querySelectorAll('.flex-col > button').forEach(b => {
                b.classList.remove('bg-secondary-fixed', 'bg-error-container');
                b.classList.add('bg-surface-container-highest');
            });

            if (isCorrect) {
                btn.classList.remove('bg-surface-container-highest');
                btn.classList.add('bg-secondary-fixed');
                
                // Micro-interaction: Flip the number
                const targetEl = document.getElementById('target-number');
                targetEl.classList.remove('flip-animate');
                // Trigger reflow
                void targetEl.offsetWidth; 
                targetEl.classList.add('flip-animate');
                
                setTimeout(() => {
                    targetEl.innerHTML = `
                        50
                        <div class="absolute -top-3 -right-3 bg-secondary-fixed text-on-surface text-xs font-bold px-2 py-1 rounded-full border-2 border-on-surface shadow-[2px_2px_0px_#1A1A1A] transform rotate-12">Rounded!</div>
                    `;
                    targetEl.classList.remove('bg-primary-container');
                    targetEl.classList.add('bg-secondary-fixed');
                }, 300); // Change halfway through the flip

            } else {
                btn.classList.remove('bg-surface-container-highest');
                btn.classList.add('bg-error-container');
                // Shake effect
                btn.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }
    </script>
