<body class="bg-blueprint min-h-screen text-on-surface antialiased flex flex-col">
<!-- TopAppBar (Task-Focused: Bottom Nav Suppressed) -->
<header class="bg-surface dark:bg-surface-dim font-headline-md text-headline-md w-full sticky top-0 z-50 border-b-[3px] border-on-surface dark:border-on-surface-variant shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between px-margin-mobile py-unit">
<div class="flex items-center gap-4">
<button class="hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-transform neo-border rounded-full p-2 bg-surface-container-lowest flex items-center justify-center neo-shadow">

</button>
<span class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed uppercase tracking-tighter">Ganit Pop</span>
</div>
<div class="neo-border bg-secondary-container px-4 py-1 rounded-full neo-shadow transform rotate-3">
<span class="font-label-bold text-label-bold text-on-secondary-container">Level 2</span>
</div>
</header>
<main class="flex-grow p-margin-mobile md:p-margin-desktop flex flex-col gap-8 max-w-7xl mx-auto w-full">
<!-- Header Section -->
<section class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
<div>
<h1 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-background mb-2">Segment Ruler Challenge</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Measure the objects using the ruler below. Type the exact length in cm.</p>
</div>
<!-- Progress Chips -->
<div class="flex gap-2">
<div class="w-8 h-8 rounded-full bg-primary neo-border neo-shadow flex items-center justify-center text-on-primary font-label-bold text-label-bold">1</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest neo-border flex items-center justify-center text-on-surface-variant font-label-bold text-label-bold">2</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest neo-border flex items-center justify-center text-on-surface-variant font-label-bold text-label-bold">3</div>
</div>
</section>
<!-- Main Challenge Area (Bento Layout) -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
<!-- Measurement Canvas -->
<div class="lg:col-span-2 bg-surface-container-lowest neo-border neo-shadow rounded-xl flex flex-col overflow-hidden">
<!-- Canvas Header -->
<div class="border-b-[3px] border-on-surface p-4 bg-tertiary-fixed flex justify-between items-center">

<span class="material-symbols-outlined text-on-tertiary-fixed">edit</span>
</div>

<div class="p-8 flex-grow flex flex-col items-center justify-center gap-12 relative min-h-[300px] bg-white bg-[radial-gradient(#e2e2e2_1px,transparent_1px)] [background-size:16px_16px]">
<!-- Object to Measure -->
<div class="relative w-full max-w-[400px] h-24 mt-8">
<!-- Connecting dotted lines to ruler -->
<div class="absolute top-full left-0 w-0 h-16 border-l-[3px] border-dashed border-primary z-0"></div>
<div class="absolute top-full left-[70%] w-0 h-16 border-l-[3px] border-dashed border-primary z-0"></div>

<div class="absolute inset-0 bg-contain bg-center bg-no-repeat z-10 drop-shadow-[4px_4px_0px_rgba(0,0,0,1)]" data-alt="A brightly lit, top-down photograph of a classic yellow wooden pencil lying horizontally on a stark white background. The image features high contrast, crisp edges, and a bold pop-art aesthetic with sharp, solid lighting creating a distinct drop shadow, fitting a neo-brutalist digital style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBuCBtkNGr8t0yiu-p_ktHrMevKM2_jb49KZUbQjCX0-X2-VPZwH-HVjHaxKlgmaj_QwTw3-4_t1qhgowMV-OFp4-woH3fdo0X48DiSLVuik9a48zcEQMyxVbBKYFNc3TLOlLrKRgrRcTuSjlJVbxOHA72Vr80AJhdxBRp96yDTCsqpl08wiawCrZKQc8-KV56MuEiM9SR-MZhUbPhAs0MXPfOkSUnsAytiiI7oav-V2R2LVcB8Zv7d50STJflW2EpkrOXUkTsajdF7');">
</div>
</div>

<div class="flex-1 border-r-[3px] border-on-surface h-full flex flex-col justify-end pb-1 relative">
<span class="absolute top-1 left-1 font-label-bold text-label-bold text-on-surface">0</span>
</div>
<div class="flex-1 border-r-[3px] border-on-surface h-1/2 mt-auto"></div>
<div class="flex-1 border-r-[3px] border-on-surface h-full flex flex-col justify-end pb-1 relative">
<span class="absolute top-1 left-1 font-label-bold text-label-bold text-on-surface">2</span>
</div>
<div class="flex-1 border-r-[3px] border-on-surface h-1/2 mt-auto"></div>
<div class="flex-1 border-r-[3px] border-on-surface h-full flex flex-col justify-end pb-1 relative">
<span class="absolute top-1 left-1 font-label-bold text-label-bold text-on-surface">4</span>
</div>
<div class="flex-1 border-r-[3px] border-on-surface h-1/2 mt-auto"></div>
<div class="flex-1 border-r-[3px] border-on-surface h-full flex flex-col justify-end pb-1 relative">
<span class="absolute top-1 left-1 font-label-bold text-label-bold text-on-surface">6</span>
</div>
<div class="flex-1 border-r-[3px] border-on-surface h-1/2 mt-auto"></div>
<div class="flex-1 border-r-[3px] border-on-surface h-full flex flex-col justify-end pb-1 relative">

</div>

<span class="absolute bottom-1 right-2 font-label-bold text-label-bold text-on-surface">cm</span>
</div>
</div>
</div>
</div>

<div class="flex flex-col gap-6">

<div class="bg-secondary-container neo-border neo-shadow p-6 rounded-xl transform rotate-1 hover:rotate-0 transition-transform">
<h2 class="font-headline-md text-headline-md text-on-secondary-container mb-4">Your Answer</h2>
<div class="flex items-center gap-2 mb-6">
<input class="flex-grow text-center font-headline-xl text-headline-xl text-on-background neo-border p-4 bg-surface-container-lowest input-focus-neo rounded-none appearance-none" placeholder="0.0" step="0.1" type="number"/>
<span class="font-headline-md text-headline-md text-on-secondary-container">cm</span>
</div>
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 neo-border neo-shadow hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all">

<span class="font-label-bold text-label-bold text-on-surface-variant">Matchstick</span>

<li class="flex items-center gap-4 p-2 bg-surface-variant neo-border grayscale opacity-70">

<span class="font-label-bold text-label-bold text-on-surface-variant">Pink Eraser</span>
</li>
</ul>
</div>
</div>
