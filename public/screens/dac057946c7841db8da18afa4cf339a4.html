<script>
        // Simple interaction for answer selection demonstration
        document.querySelectorAll('.neo-button').forEach(button => {
            button.addEventListener('click', function() {
                // Remove active styling from all buttons in the group
                const parent = this.parentElement;
                if(parent && parent.classList.contains('flex-col')) {
                    Array.from(parent.children).forEach(sibling => {
                        if(sibling !== this) {
                            sibling.classList.remove('bg-primary', 'text-on-primary');
                            sibling.classList.add('bg-surface-container-lowest', 'text-on-surface');
                            
                            // Reset icon container if exists
                            const iconContainer = sibling.querySelector('.w-8.h-8');
                            if(iconContainer) {
                                iconContainer.classList.remove('border-on-primary', 'bg-primary-container', 'text-on-primary-container');
                                iconContainer.classList.add('border-on-surface', 'bg-surface');
                            }
                            
                            // Remove check mark if exists
                            const checkMark = sibling.querySelector('.absolute.right-4');
                            if(checkMark) checkMark.remove();
                        }
                    });
                }
                
                // Add click effect
                this.style.transform = 'translate(4px, 4px)';
                this.style.boxShadow = '0px 0px 0px #1a1c1c';
                
                setTimeout(() => {
                    this.style.transform = '';
                    this.style.boxShadow = '';
                }, 150);
            });
        });
