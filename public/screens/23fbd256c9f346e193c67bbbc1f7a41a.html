                    b.classList.remove('bg-secondary-container', 'ring-4', 'ring-on-background');
                    b.classList.add('bg-surface');
                    const letter = b.querySelector('span:first-child');
                    letter.classList.remove('bg-primary-container', 'text-on-primary-container');
                    letter.classList.add('bg-surface-variant');
                });
                
                // Set active
                this.classList.remove('bg-surface');
                this.classList.add('bg-secondary-container', 'ring-4', 'ring-on-background');
                const letter = this.querySelector('span:first-child');

                letter.classList.add('bg-primary-container', 'text-on-primary-container');
