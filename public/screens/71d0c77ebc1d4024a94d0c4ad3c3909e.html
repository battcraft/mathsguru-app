<!-- Main Content Canvas -->
<main class="max-w-4xl mx-auto px-margin-mobile pt-8 flex flex-col gap-8">
<!-- Instruction Section -->
<section class="bg-surface-container-lowest border-3 border-black p-6 shadow-[4px_4px_0px_#1A1A1A]">

<span class="material-symbols-outlined text-primary text-4xl">map</span>
<p class="font-body-lg text-body-lg text-on-background">

                </p>
</div>
</section>
<!-- The Interactive Map -->
<section class="relative bg-white border-3 border-black p-4 shadow-[4px_4px_0px_#1A1A1A] overflow-hidden aspect-square md:aspect-video flex items-center justify-center">
<!-- Geometric Street Map Container -->
<div class="w-full h-full relative border-2 border-surface-variant flex items-center justify-center bg-[#f0f1f1]">
<!-- Custom SVG Grid -->
<svg class="w-full h-full max-w-[500px] max-h-[500px]" viewbox="0 0 400 400">
<!-- Grid Lines -->
<g class="map-grid-line">
<line x1="50" x2="350" y1="50" y2="50"></line>
<line x1="50" x2="350" y1="125" y2="125"></line>
<line x1="50" x2="350" y1="200" y2="200"></line>
<line x1="50" x2="350" y1="275" y2="275"></line>
<line x1="50" x2="350" y1="350" y2="350"></line>
<line x1="50" x2="50" y1="50" y2="350"></line>
<line x1="125" x2="125" y1="50" y2="350"></line>
<line x1="200" x2="200" y1="50" y2="350"></line>
<line x1="275" x2="275" y1="50" y2="350"></line>
<line x1="350" x2="350" y1="50" y2="350"></line>
</g>
<!-- Axis Labels -->
<text class="font-bold text-xs" text-anchor="middle" x="50" y="375">0</text>
<text class="font-bold text-xs" text-anchor="middle" x="125" y="375">1</text>
<text class="font-bold text-xs" text-anchor="middle" x="200" y="375">2</text>
<text class="font-bold text-xs" text-anchor="middle" x="275" y="375">3</text>
<text class="font-bold text-xs" text-anchor="middle" x="350" y="375">4</text>
<text class="font-bold text-xs" text-anchor="middle" x="30" y="355">0</text>
<text class="font-bold text-xs" text-anchor="middle" x="30" y="280">1</text>
<text class="font-bold text-xs" text-anchor="middle" x="30" y="205">2</text>
<text class="font-bold text-xs" text-anchor="middle" x="30" y="130">3</text>
<text class="font-bold text-xs" text-anchor="middle" x="30" y="55">4</text>
<!-- Landmarks with stickers -->
<!-- School at (1,1) -->
<circle cx="125" cy="275" fill="#b40067" r="8" stroke="black" stroke-width="2"></circle>
<foreignobject height="50" width="80" x="110" y="220">
<div class="bg-secondary-fixed border-2 border-black px-1 text-[10px] font-bold text-center">School</div>
</foreignobject>
<!-- Park at (3,2) -->
<circle cx="275" cy="200" fill="#705d00" r="8" stroke="black" stroke-width="2"></circle>
<foreignobject height="50" width="80" x="260" y="145">
<div class="bg-tertiary-fixed border-2 border-black px-1 text-[10px] font-bold text-center">Park</div>
</foreignobject>
<!-- Bhaiya's House at (1,3) -->
<circle cx="125" cy="125" fill="#f88400" r="10" stroke="black" stroke-width="3"></circle>

</foreignobject>
</svg>
</div>
<!-- Map Legend Overlay -->
<div class="absolute bottom-6 right-6 p-2 bg-white border-3 border-black text-xs font-label-bold flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full bg-primary border border-black"></span> <span>(X, Y)</span>
</div>
<div class="flex items-center gap-2">

</div>
</div>

<!-- Question and Action Buttons -->
<section class="bg-surface-container border-3 border-black p-8 shadow-[4px_4px_0px_#1A1A1A] text-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-8">
                Bhaiya ka ghar <span class="text-secondary font-bold">(Point B)</span> kahan hai?
            </h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-6">
<!-- Option 1 -->
<button class="bg-white border-3 border-black py-4 px-6 font-headline-md text-headline-md shadow-[4px_4px_0px_#1A1A1A] hover:shadow-[6px_6px_0px_#1A1A1A] transition-all active:translate-x-1 active:translate-y-1 active:shadow-none hover:bg-surface-container-high" onclick="handleSelect(this, false)">

                    (1, 3)
                </button>
<!-- Option 3 -->
<button class="bg-white border-3 border-black py-4 px-6 font-headline-md text-headline-md shadow-[4px_4px_0px_#1A1A1A] hover:shadow-[6px_6px_0px_#1A1A1A] transition-all active:translate-x-1 active:translate-y-1 active:shadow-none hover:bg-surface-container-high" onclick="handleSelect(this, false)">
                    (3, 1)
                </button>
<!-- Option 4 -->
<button class="bg-white border-3 border-black py-4 px-6 font-headline-md text-headline-md shadow-[4px_4px_0px_#1A1A1A] hover:shadow-[6px_6px_0px_#1A1A1A] transition-all active:translate-x-1 active:translate-y-1 active:shadow-none hover:bg-surface-container-high" onclick="handleSelect(this, false)">
                    (3, 4)
                </button>
</div>

<span class="material-symbols-outlined">auto_stories</span>
<span class="font-label-lg text-label-lg">Story</span>
</a>

<script>
        function handleSelect(btn, isCorrect) {
            const toast = document.getElementById('feedback-toast');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const msg = document.getElementById('feedback-msg');

            // Reset all buttons
            document.querySelectorAll('button').forEach(b => {
                b.classList.remove('bg-primary', 'text-white', 'bg-error', 'text-white');
            });

            if (isCorrect) {
                btn.classList.add('bg-primary-container', 'text-on-primary-container');
                icon.innerText = 'check_circle';
                icon.className = 'material-symbols-outlined text-primary text-3xl';
                title.innerText = 'Wah! Sahi Jawab!';
                msg.innerText = 'Bhaiya\'s house is at (1,3). 1 step right, 3 steps up!';
                
                // Add mini confetti effect with JS
                for(let i=0; i<10; i++) {
                    createConfetti();
                }
            } else {
                btn.classList.add('bg-error', 'text-white');
                icon.innerText = 'cancel';
                icon.className = 'material-symbols-outlined text-error text-3xl';
                title.innerText = 'Oh no! Try again.';
                msg.innerText = 'Look at the X-axis first, then the Y-axis.';
            }

            toast.classList.remove('hidden');
            toast.classList.add('flex');
            
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }, 3000);
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'fixed w-3 h-3 bg-primary border-2 border-black z-50 pointer-events-none';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-20px';
            confetti.style.backgroundColor = ['#b40067', '#f88400', '#ffe16d'][Math.floor(Math.random()*3)];
            document.body.appendChild(confetti);

            const animation = confetti.animate([
                { transform: 'translateY(0) rotate(0)', opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: 2000 + Math.random() * 2000,
                easing: 'cubic-bezier(0,.37,1,.63)'
            });

            animation.onfinish = () => confetti.remove();
        }
    </script>
