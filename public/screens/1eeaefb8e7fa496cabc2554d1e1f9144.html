<style>
        /* Neo-Brutalist utility classes for interactions not easily handled by standard Tailwind */
        .brutal-shadow {
            box-shadow: 4px 4px 0px 0px #1b1c19;
        }
        .brutal-active:active {
            box-shadow: 0px 0px 0px 0px #1b1c19;
            transform: translate(4px, 4px);
        }
        
        /* Math Chip Selection States */
        .dot-selected-correct {
            background-color: #63ff9d !important; /* secondary-container */
            color: #00743c !important; /* on-secondary-container */
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #1b1c19 !important;
        }
        .dot-selected-wrong {
            background-color: #ffdad6 !important; /* error-container */
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">

<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg font-bold text-primary uppercase tracking-tighter">Ganit Pop</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-container-max-width mx-auto px-margin-mobile py-8 pb-32 flex flex-col gap-6">
<!-- Instruction Card -->
<div class="bg-primary-fixed border-[3px] border-on-surface brutal-shadow rounded-DEFAULT p-5 relative overflow-hidden">
<!-- Decorative pattern behind text -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#1b1c19 2px, transparent 2px); background-size: 16px 16px;"></div>
<div class="relative z-10">
<h2 class="font-headline-xl-mobile text-headline-xl-mobile text-on-primary-fixed mb-2">Find the Vertex!</h2>
<p class="font-body-lg text-body-lg text-on-primary-fixed-variant font-bold">Har Kiran ka starting point (Vertex) pehchano!</p>
</div>
</div>
<!-- Activity Grid / List -->
<div class="flex flex-col gap-8 mt-4">
<!-- Ray Challenge 1: Pointing Right -->
<div class="bg-surface border-[3px] border-on-surface brutal-shadow rounded-DEFAULT p-6 flex flex-col gap-4">
<div class="flex justify-between items-center border-b-[3px] border-on-surface pb-2">
<span class="font-headline-md text-headline-md">1. Kiran PXY</span>
<span class="material-symbols-outlined text-primary-container" data-icon="east" style="font-variation-settings: 'FILL' 1;">east</span>
</div>
<div class="relative w-full h-24 flex items-center mt-4">
<!-- Line -->
<div class="absolute left-[10%] right-[10%] h-[4px] bg-on-surface z-0"></div>
<!-- Arrowhead -->
<div class="absolute right-[8%] w-5 h-5 border-t-[4px] border-r-[4px] border-on-surface transform rotate-45 z-0"></div>
<!-- Interactive Dots -->
<button class="ray-dot absolute left-[10%] -translate-x-1/2 w-12 h-12 rounded-full border-[3px] border-on-surface bg-surface brutal-shadow flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:-translate-y-1 transition-transform z-10 focus:outline-none focus:ring-4 focus:ring-primary-container" data-correct="true">P</button>
<button class="ray-dot absolute left-[45%] -translate-x-1/2 w-12 h-12 rounded-full border-[3px] border-on-surface bg-surface brutal-shadow flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:-translate-y-1 transition-transform z-10 focus:outline-none focus:ring-4 focus:ring-primary-container" data-correct="false">X</button>
<button class="ray-dot absolute left-[80%] -translate-x-1/2 w-12 h-12 rounded-full border-[3px] border-on-surface bg-surface brutal-shadow flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:-translate-y-1 transition-transform z-10 focus:outline-none focus:ring-4 focus:ring-primary-container" data-correct="false">Y</button>
</div>
</div>
<!-- Ray Challenge 2: Pointing Left -->
<div class="bg-surface-container border-[3px] border-on-surface brutal-shadow rounded-DEFAULT p-6 flex flex-col gap-4">
<div class="flex justify-between items-center border-b-[3px] border-on-surface pb-2">
<span class="font-headline-md text-headline-md">2. Kiran QAB</span>
<span class="material-symbols-outlined text-tertiary-container" data-icon="west" style="font-variation-settings: 'FILL' 1;">west</span>
</div>
<div class="relative w-full h-24 flex items-center mt-4">
<!-- Line -->
<div class="absolute left-[10%] right-[10%] h-[4px] bg-on-surface z-0"></div>
<!-- Arrowhead (Left) -->
<div class="absolute left-[8%] w-5 h-5 border-b-[4px] border-l-[4px] border-on-surface transform rotate-45 z-0"></div>

<div class="flex justify-between items-center border-b-[3px] border-on-surface pb-2">

</button>
<button class="ray-dot absolute left-[50%] -translate-x-1/2 w-12 h-12 rounded-full border-[3px] border-on-surface bg-surface brutal-shadow flex items-center justify-center text-on-surface hover:scale-110 transition-transform z-10 focus:outline-none" data-correct="false">

<span class="font-headline-md text-headline-md block transform -rotate-[15deg]">N</span>

</button>

</button>
<!-- Story -->
<button class="text-on-surface flex flex-col items-center gap-1 hover:bg-surface-variant active:scale-95 transition-transform rounded-lg px-4 py-1">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-label-lg text-label-lg">Story</span>
</button>
</nav>
<!-- Interactive Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const dots = document.querySelectorAll('.ray-dot');
            
            dots.forEach(dot => {
                dot.addEventListener('click', function() {
                    // Reset styling on siblings within the same ray card
                    const siblings = this.parentElement.querySelectorAll('.ray-dot');
                    siblings.forEach(s => {
                        s.classList.remove('dot-selected-correct', 'dot-selected-wrong');
                    });

                    // Check if correct
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    
                    if (isCorrect) {
                        this.classList.add('dot-selected-correct');
                        // Optional: Add a small confetti or success sound logic here
                    } else {
                        this.classList.add('dot-selected-wrong');
                        // Remove the wrong class after animation completes so it can shake again
                        setTimeout(() => {
                            this.classList.remove('dot-selected-wrong');
                        }, 400);
                    }
                });
            });
        });
    </script>
