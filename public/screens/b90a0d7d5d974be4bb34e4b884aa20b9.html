<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kahani: The Number Line Race</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&amp;family=Nunito+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mango: '#FF6B00',
            gulabi: '#FF007F',
            chalk: '#FFFDF7',
            black: '#000000',
          },
          fontFamily: {
            display: ['Bricolage Grotesque', 'sans-serif'],
            body: ['Nunito Sans', 'sans-serif'],
          },
          boxShadow: {
            'brutal': '4px 4px 0px 0px rgba(0,0,0,1)',
          }
        }
      }
    }
  </script>
<style data-purpose="base-styles">
    body {
      background-color: #FFFDF7;
      font-family: 'Nunito Sans', sans-serif;
      /* Remove default margin/padding for mobile view */
      margin: 0;
      padding: 0;
      /* Prevent horizontal scroll */
      overflow-x: hidden;
      /* Ensure full height */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1, h2, h3, .font-display {
      font-family: 'Bricolage Grotesque', sans-serif;
    }
  </style>
</head>
<body class="text-black antialiased relative pb-20"> <!-- Added padding bottom for fixed navbar -->
<!-- BEGIN: TopAppBar -->
<header class="sticky top-0 z-50 bg-chalk border-b-4 border-black px-4 py-3 flex items-center justify-between">
<button aria-label="Go back" class="w-10 h-10 border-3 border-black rounded-full flex items-center justify-center bg-white shadow-brutal active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<h1 class="font-display font-bold text-xl uppercase tracking-wider">Kahani 2/5</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for balance -->
</header>
<!-- END: TopAppBar -->
<!-- BEGIN: ProgressBar -->
<div class="px-4 py-3 bg-white border-b-3 border-black">
<div class="h-3 w-full border-2 border-black rounded-full overflow-hidden bg-gray-100">
<div class="h-full bg-mango border-r-2 border-black w-2/5"></div>
</div>
</div>
<!-- END: ProgressBar -->
<main class="flex-1 p-4 space-y-6">
<!-- BEGIN: StoryPanel -->
<section class="relative">
<div class="border-3 border-black rounded-xl overflow-hidden shadow-brutal bg-white">
<!-- Image placeholder exactly as requested -->
<img alt="A vibrant, high-energy cartoon illustration of two numbers personified as runners on a colorful race track that looks like a giant horizontal number line." class="w-full h-auto object-cover max-h-[50vh]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnca-z1IaPuMgY2_qqOrTwpPsJVrMHot--nVpHTamQdAKKy8dsCEuvInRqIMt_sbHLyw0okV2qAW3_rNV2p908BXW1n_4AdBtjOLA-oFfDiuK1sNYnSz0HinZNf9qQsZYnjI82Fe2QhxaQv_qAmJoUnYlRzz0ZKJzQ6qej2FF5dnmCpUHjEfXSg0m7RmKTMFso4VW4xQ64gcWkHKCyWe--HkY4bx6rZjSajLQwoHLTI-OtVNU0_rVnebftgVHWBvP4l0kg7wA1YhP3"/>
</div>
</section>
<!-- END: StoryPanel -->
<!-- BEGIN: NarrativeBox -->
<div class="relative bg-white border-3 border-black p-4 rounded-2xl shadow-brutal">
<!-- Triangle for speech bubble effect -->
<div class="absolute -top-3 left-8 w-6 h-6 bg-white border-t-3 border-l-3 border-black transform rotate-45 z-10"></div>
<p class="font-body text-lg font-bold leading-snug">Dekho! Track par numbers race laga rahe hain. Kaun jitega?</p>
</div>
<!-- END: NarrativeBox -->
<!-- BEGIN: RuleCard -->
<div class="bg-gulabi border-3 border-black p-4 rounded-xl shadow-brutal text-center transform -rotate-1">
<h2 class="font-display font-bold text-white text-xl uppercase tracking-wide">Bada Number, Tez Bhaagta Hai! ⚡</h2>
</div>
<!-- END: RuleCard -->
<!-- BEGIN: ComparisonDetail -->
<div class="bg-white border-3 border-black p-4 rounded-xl shadow-brutal space-y-3">
<p class="font-body font-bold text-gray-800">Number 85 aur Number 42 dono bhag rahe hain. 85 aage nikal gaya kyunki wo bada hai!</p>
<!-- Math Symbol Badge -->
<div class="flex justify-center mt-4">
<div class="inline-flex items-center gap-2 bg-[#E0F2FE] border-3 border-black px-4 py-2 rounded-full shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
<svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785A5.969 5.969 0 006 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="font-display font-bold text-xl text-black">85 &gt; 42</span>
</div>
</div>
</div>
<!-- END: ComparisonDetail -->
</main>
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-0 w-full bg-white border-t-3 border-black flex justify-around items-center h-16 px-2 z-50">
<button class="flex flex-col items-center justify-center w-full h-full text-mango font-bold">
<svg class="w-6 h-6 mb-1" fill="currentColor" stroke="black" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-xs font-display uppercase tracking-wider">Story</span>
</button>
<!-- Placeholder for other nav items -->
<div class="w-full flex justify-center items-center opacity-50">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</nav>
<!-- END: BottomNavigation -->
<!-- BEGIN: FloatingCTA -->
<div class="fixed bottom-20 right-4 left-4 z-40">
<button class="w-full bg-mango border-3 border-black text-black font-display font-bold text-xl py-3 px-6 rounded-xl shadow-brutal flex items-center justify-between active:translate-x-1 active:translate-y-1 active:shadow-none transition-all uppercase tracking-wide">
<span>Agla Level</span>
<span class="text-2xl leading-none">➔</span>
</button>
</div>
<!-- END: FloatingCTA -->
</body></html>
