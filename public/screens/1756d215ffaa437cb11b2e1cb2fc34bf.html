<style>
        .neo-brutalist-bg {
            background-image: radial-gradient(circle at 1px 1px, #dadada 1px, transparent 0);
            background-size: 32px 32px;
        }
        .matchstick {
            position: relative;
            background-color: #f88400; /* Auto Yellow/Orange */
            border: 3px solid #1a1c1c;
            border-radius: 4px;
            box-shadow: 2px 2px 0px #1a1c1c;
        }
        .matchstick::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background-color: #b40067; /* Gulabi Pink */
            border: 3px solid #1a1c1c;
            border-radius: 50%;
        }
        .btn-neo {
            border: 3px solid #1a1c1c;
            box-shadow: 4px 4px 0px #1B1C19;
            transition: all 0.1s ease-in-out;
        }
        .btn-neo:active, .btn-neo.active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #1B1C19;
        }
        .btn-neo:hover:not(.active) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #1B1C19;
        }
    </style>

<!-- Header Section -->

<span class="inline-block bg-tertiary-fixed text-on-tertiary-fixed px-3 py-1 text-sm font-label-bold border-[3px] border-on-surface rounded-full mb-3 shadow-[2px_2px_0px_#1B1C19]">Level 1: Matchstick Math</span>
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Line Segments (Rekha Khand)</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Is triangle mein kitne line segments hain?</p>
</div>

<div class="w-full max-w-md aspect-square bg-surface-container-highest border-[3px] border-on-surface rounded-xl shadow-[4px_4px_0px_#1B1C19] flex items-center justify-center relative mb-10 overflow-hidden" id="visual-area">
<!-- Grid Pattern Overlay -->
<div class="absolute inset-0 opacity-20" style="background-image: linear-gradient(#1a1c1c 1px, transparent 1px), linear-gradient(90deg, #1a1c1c 1px, transparent 1px); background-size: 20px 20px;"></div>

<div class="relative w-48 h-48 flex items-center justify-center z-10 scale-125 md:scale-150">
<!-- Bottom Matchstick -->
<div class="matchstick absolute bottom-4 w-32 h-2" style="transform: rotate(0deg); left: 50%; margin-left: -64px;"></div>
<!-- Left Matchstick -->
<div class="matchstick absolute w-32 h-2" style="transform: rotate(60deg); transform-origin: left center; bottom: 16px; left: 16px;"></div>
<!-- Right Matchstick -->

</a>

</a>

<script>
        const answerBtns = document.querySelectorAll('.answer-btn');
        const successOverlay = document.getElementById('success-overlay');

        answerBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // Reset styles
                answerBtns.forEach(b => {
                    b.classList.remove('bg-error-container', 'text-on-error-container', 'border-error', 'active');
                    b.classList.add('bg-surface-container-lowest', 'text-on-surface');
                });

                const value = this.getAttribute('data-value');
                
                if(value === '3') {
                    // Correct Answer
                    this.classList.remove('bg-surface-container-lowest');
                    this.classList.add('bg-tertiary-fixed', 'active');
                    
                    // Show success
                    successOverlay.classList.remove('hidden');
                    // Slight delay for transition to work
                    setTimeout(() => {
                        successOverlay.classList.remove('opacity-0');
                    }, 50);

                } else {
                    // Wrong Answer
                    this.classList.remove('bg-surface-container-lowest', 'text-on-surface');
                    this.classList.add('bg-error-container', 'text-on-error-container');
                    
                    // Shake animation
                    this.animate([
                        { transform: 'translateX(0px)' },
                        { transform: 'translateX(-5px)' },
                        { transform: 'translateX(5px)' },
                        { transform: 'translateX(-5px)' },
                        { transform: 'translateX(5px)' },
                        { transform: 'translateX(0px)' }
                    ], {
                        duration: 300,
                        iterations: 1
                    });
                }
            });
        });

        function resetQuiz() {
            successOverlay.classList.add('opacity-0');
            setTimeout(() => {
                successOverlay.classList.add('hidden');
            }, 300);
            
            answerBtns.forEach(b => {
                b.classList.remove('bg-error-container', 'text-on-error-container', 'bg-tertiary-fixed', 'active');
                b.classList.add('bg-surface-container-lowest', 'text-on-surface');
            });
        }
    </script>
