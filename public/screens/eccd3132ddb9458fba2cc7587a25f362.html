<!-- JavaScript for Interactions -->
<script>
        function selectOption(selectedButton) {
            const allButtons = document.querySelectorAll('.option-btn');
            const submitBtn = document.getElementById('submit-btn');

            // Reset all buttons to default neo-brutalist unselected state
            allButtons.forEach(btn => {
                // Remove active classes
                btn.classList.remove('bg-tertiary-fixed', 'border-primary', 'shadow-[8px_8px_0px_#b40067]', '-translate-y-2', '-translate-x-2');
                
                // Reset to default classes
                btn.classList.add('bg-surface-container-lowest', 'border-on-surface', 'shadow-[4px_4px_0px_#1a1c1c]');
                
                // Reset icon color
                const icon = btn.querySelector('.material-symbols-outlined');
                icon.classList.remove('text-primary');
                icon.classList.add('text-on-surface-variant');
                icon.style.fontVariationSettings = "'FILL' 0";
            });

            // Apply active state to selected button
            // Active state: Pop out more, change background to a vibrant highlight, change border to primary
            selectedButton.classList.remove('bg-surface-container-lowest', 'border-on-surface', 'shadow-[4px_4px_0px_#1a1c1c]');
            selectedButton.classList.add('bg-tertiary-fixed', 'border-primary', 'shadow-[8px_8px_0px_#b40067]', '-translate-y-2', '-translate-x-2');
            
            // Highlight icon
            const selectedIcon = selectedButton.querySelector('.material-symbols-outlined');
            selectedIcon.classList.remove('text-on-surface-variant');
            selectedIcon.classList.add('text-primary');
            selectedIcon.style.fontVariationSettings = "'FILL' 1";

            // Enable submit button
            submitBtn.disabled = false;
            
            // Add a subtle pop animation to submit button to draw attention
            submitBtn.classList.add('animate-pulse');
            setTimeout(() => {
                submitBtn.classList.remove('animate-pulse');
            }, 1000);
        }
    </script>
