<script>
        function handleChoice(choice) {
            const explainerContainer = document.getElementById('explainer-text');
            const explainerContent = document.getElementById('explainer-content');
            
            explainerContainer.classList.remove('hidden');
            
            // Force reflow
            void explainerContainer.offsetWidth;
            
            if(choice === 'correct') {
                explainerContent.innerHTML = "<strong>Sahi jawab!</strong> Ek line segment ke do fixed endpoints hote hain, isliye uski lambai (length) ko ruler se accurately measure kiya ja sakta hai.";
                explainerContent.parentElement.className = "flex items-start gap-3 p-4 bg-tertiary-fixed neo-border";
            } else {
                explainerContent.innerHTML = "<strong>Socho wapas!</strong> Jo chalti rehti hai use 'Line' ya 'Ray' kehte hain. Par 'Line Segment' ke dono ends band (fixed) hote hain, isliye use naapa ja sakta hai.";
                explainerContent.parentElement.className = "flex items-start gap-3 p-4 bg-secondary-fixed neo-border";
            }
            
            explainerContainer.classList.add('open');
        }
    </script>
