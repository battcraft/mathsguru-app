<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.duel-btn');
            const feedbackArea = document.getElementById('feedback-area');
            
            // Logic: 7.8 < 7.85
            const correctAnswer = 'less';

            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const action = this.getAttribute('data-action');
                    
                    // Reset buttons
                    buttons.forEach(b => {
                        b.classList.remove('bg-error-container', 'bg-[#cce8cc]'); // generic green for success logic
                        b.style.transform = '';
                    });
                    
                    this.classList.add('brutalist-shadow-active');
                    setTimeout(() => this.classList.remove('brutalist-shadow-active'), 150);

                    feedbackArea.classList.remove('hidden', 'bg-error-container', 'text-on-error-container', 'bg-[#cce8cc]', 'text-[#004d00]');
                    
                    if (action === correctAnswer) {
                        // Correct
                        this.classList.replace('bg-tertiary-container', 'bg-[#cce8cc]'); // applying inline color for specific feedback per prompt
                        feedbackArea.classList.add('bg-[#cce8cc]', 'text-[#004d00]');
                        feedbackArea.innerHTML = 'Ekdum Sahi! <span class="material-symbols-outlined align-middle ml-2">check_circle</span>';
                    } else {
                        // Wrong
                        this.classList.replace('bg-surface-container-lowest', 'bg-error-container');
                        this.classList.replace('bg-tertiary-container', 'bg-error-container');
                        feedbackArea.classList.add('bg-error-container', 'text-on-error-container');
                        feedbackArea.innerHTML = 'Galat! Try again. <span class="material-symbols-outlined align-middle ml-2">cancel</span>';
                    }
                });
            });
        });
    </script>
