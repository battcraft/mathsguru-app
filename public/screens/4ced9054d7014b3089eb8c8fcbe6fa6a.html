                Next Challenge

</button>

</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.hunt-item');
            const feedbackPanel = document.getElementById('feedback-panel');
            let foundCorrect = false;

            items.forEach(item => {
                item.addEventListener('click', () => {
                    const isCorrect = item.getAttribute('data-correct') === 'true';
                    
                    // Reset others slightly to focus on selection
                    items.forEach(i => i.classList.remove('scale-105'));

                    if (isCorrect) {
                        item.classList.add('selected-correct');
                        item.querySelector('.selection-indicator').classList.remove('hidden');
                        
                        // Show feedback
                        feedbackPanel.classList.remove('hidden');
                        // Trigger reflow
                        void feedbackPanel.offsetWidth;
                        feedbackPanel.classList.remove('translate-y-4', 'opacity-0');
                        
                        // Add some celebratory styling
                        document.body.style.backgroundColor = '#ffd9e3'; // primary-fixed flash
                        setTimeout(() => {
                            document.body.style.backgroundColor = '';
                        }, 300);

                        foundCorrect = true;
                    } else {
                        // Wrong selection feedback
                        item.classList.add('selected-wrong');
                        item.style.transform = 'translate(4px, 4px)';
                        setTimeout(() => {
                            item.classList.remove('selected-wrong');
                            item.style.transform = '';
                        }, 500);
                    }
                });
            });
        });
    </script>
