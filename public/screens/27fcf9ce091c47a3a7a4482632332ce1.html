<script>
        function handleSelect(btn) {
            // Remove existing selection classes from all
            document.querySelectorAll('button').forEach(b => {
                b.classList.remove('bg-primary-container', 'text-on-primary-container', 'translate-x-[4px]', 'translate-y-[4px]', 'shadow-none');
                b.classList.add('bg-surface');
            });
            
            // Add selection style to clicked
            btn.classList.remove('bg-surface');
            btn.classList.add('bg-primary-container', 'text-on-primary-container', 'translate-x-[4px]', 'translate-y-[4px]', 'shadow-none');
            
            // Check if it's correct (500)
            const val = btn.querySelector('span:last-child').innerText;
            if(val === '500') {
                confetti();
            }
        }

        // Simple particle effect for "Confetti" on correct answer
        function confetti() {
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.style.position = 'fixed';
                el.style.width = '8px';
                el.style.height = '8px';
                el.style.backgroundColor = ['#b40067', '#f88400', '#705d00'][Math.floor(Math.random()*3)];
                el.style.left = '50%';
                el.style.top = '50%';
                el.style.zIndex = '100';
                el.style.borderRadius = '2px';
                el.style.border = '1px solid black';
                document.body.appendChild(el);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 200;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                
                el.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'cubic-bezier(0,0,0.2,1)'
                }).onfinish = () => el.remove();
            }
        }
    </script>
