<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Practice Zone - Ray Hunter</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#eeeeee",
                        "on-background": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#6f3800",
                        "surface-tint": "#b80069",
                        "primary-fixed": "#ffd9e3",
                        "secondary": "#924c00",
                        "surface-bright": "#f9f9f9",
                        "primary": "#b40067",
                        "on-primary-fixed-variant": "#8d004f",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-container": "#fffbff",
                        "secondary-container": "#f88400",
                        "outline": "#8d6f78",
                        "on-error": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#705d00",
                        "primary-fixed-dim": "#ffb0cb",
                        "on-tertiary-fixed": "#221b00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#5b2d00",
                        "on-primary-fixed": "#3e0020",
                        "on-tertiary-container": "#4c3f00",
                        "secondary-fixed": "#ffdcc4",
                        "inverse-primary": "#ffb0cb",
                        "secondary-fixed-dim": "#ffb781",
                        "surface-container-low": "#f3f3f4",
                        "background": "#f9f9f9",
                        "surface": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-surface-variant": "#5a3f48",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffe16d",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-secondary-fixed": "#2f1400",
                        "tertiary-fixed-dim": "#e9c400",
                        "surface-dim": "#dadada",
                        "outline-variant": "#e1bdc7",
                        "primary-container": "#df0b81",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f0f1f1",
                        "tertiary-container": "#c9a900"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "border-width": "3px",
                        "gutter": "16px",
                        "unit": "8px",
                        "shadow-offset": "4px"
                    },
                    fontFamily: {
                        "headline-lg": ["Fredoka"],
                        "label-bold": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],
                        "headline-xl": ["Fredoka"],
                        "headline-md": ["Fredoka"],
                        "headline-xl-mobile": ["Fredoka"]
                    },
                    fontSize: {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-xl-mobile": ["36px", { "lineHeight": "1.1", "fontWeight": "600" }]
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        }
                    },
                    animation: {
                        wiggle: 'wiggle 0.2s ease-in-out 2',
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .blueprint-pattern {
            background-size: 64px 64px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        }

        .dot-pattern {
            background-image: radial-gradient(theme('colors.on-surface') 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.2;
        }

        .shape-active-shadow {
            box-shadow: 4px 4px 0px 0px rgba(26,28,28,1);
        }
        
        .shape-pressed {
            box-shadow: 0px 0px 0px 0px rgba(26,28,28,1) !important;
            transform: translate(4px, 4px) !important;
        }

        /* Prevent default touch highlight on mobile */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-md text-body-md selection:bg-primary-fixed selection:text-on-primary-fixed relative">
<!-- Background Pattern -->
<div class="fixed inset-0 blueprint-pattern pointer-events-none z-[-1]"></div>
<!-- TopAppBar (from JSON) -->
<header class="w-full sticky top-0 z-50 bg-surface border-b-[3px] border-on-surface shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-between px-margin-mobile py-unit transition-all">
<button aria-label="Go back" class="text-primary hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none flex items-center justify-center p-2 border-[3px] border-transparent hover:border-on-surface rounded-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary uppercase tracking-tighter">Ganit Pop</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col pt-8 pb-12 px-margin-mobile md:px-margin-desktop overflow-hidden">
<!-- Progress Bar & Header -->
<div class="w-full max-w-3xl mx-auto mb-8 flex flex-col items-center">
<div class="w-full flex gap-2 mb-6">
<!-- Question 1 (Completed) -->
<div class="h-3 flex-1 bg-primary border-[3px] border-on-surface shape-active-shadow"></div>
<!-- Question 2 (Completed) -->
<div class="h-3 flex-1 bg-primary border-[3px] border-on-surface shape-active-shadow"></div>
<!-- Question 3 (Current) -->
<div class="h-3 flex-1 bg-surface-container-highest border-[3px] border-on-surface shape-active-shadow relative overflow-hidden">
<div class="absolute inset-0 bg-primary/30 animate-pulse"></div>
</div>
<!-- Question 4 (Pending) -->
<div class="h-3 flex-1 bg-surface border-[3px] border-on-surface"></div>
<!-- Question 5 (Pending) -->
<div class="h-3 flex-1 bg-surface border-[3px] border-on-surface"></div>
</div>
<h2 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-surface mb-4 text-center">Ray Hunter</h2>
<div class="bg-tertiary-fixed border-[3px] border-on-surface shape-active-shadow px-6 py-3 inline-block -rotate-1 transform transition-transform hover:rotate-0">
<p class="font-body-lg text-body-lg font-bold text-on-tertiary-fixed-variant">
                    Tap only the <span class="text-primary underline decoration-[3px] underline-offset-4">Rays</span> (one dot, one arrow).
                </p>
</div>
</div>
<!-- Play Area Canvas -->
<div class="flex-1 w-full max-w-5xl mx-auto bg-surface-container-lowest border-[3px] border-on-surface shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] relative overflow-hidden flex flex-col">
<!-- Canvas Grid Overlay -->
<div class="absolute inset-0 dot-pattern pointer-events-none"></div>
<!-- Play Area Content (Shapes) -->
<div class="relative w-full h-[530px] md:h-[500px] p-4 sm:p-8" id="play-area">
<!-- Shape 1: Line (Distractor) -->
<button class="shape-btn absolute top-[10%] left-[10%] md:left-[20%] p-4 border-[3px] border-transparent hover:border-on-surface hover:bg-surface-variant transition-all rounded-sm cursor-pointer rotate-12 group focus:outline-none focus:ring-4 focus:ring-secondary-container" data-type="line">
<svg class="stroke-on-surface fill-on-surface group-hover:stroke-secondary group-hover:fill-secondary transition-colors" height="80" viewbox="0 0 100 100" width="80">
<!-- Arrows both ends -->
<polygon points="20,40 0,50 20,60"></polygon>
<line stroke-linecap="round" stroke-width="4" x1="20" x2="80" y1="50" y2="50"></line>
<polygon points="80,40 100,50 80,60"></polygon>
</svg>
</button>
<!-- Shape 2: Segment (Distractor) -->
<button class="shape-btn absolute top-[50%] left-[5%] md:left-[10%] p-4 border-[3px] border-transparent hover:border-on-surface hover:bg-surface-variant transition-all rounded-sm cursor-pointer -rotate-45 group focus:outline-none focus:ring-4 focus:ring-secondary-container" data-type="segment">
<svg class="stroke-on-surface fill-on-surface group-hover:stroke-tertiary group-hover:fill-tertiary transition-colors" height="90" viewbox="0 0 100 100" width="90">
<!-- Dots both ends -->
<circle cx="10" cy="50" r="8"></circle>
<line stroke-linecap="round" stroke-width="4" x1="10" x2="90" y1="50" y2="50"></line>
<circle cx="90" cy="50" r="8"></circle>
</svg>
</button>
<!-- Shape 3: Ray (Target 1) -->
<button class="shape-btn target-ray absolute top-[20%] right-[15%] md:right-[30%] p-4 border-[3px] border-transparent hover:border-on-surface hover:bg-surface-variant transition-all rounded-sm cursor-pointer rotate-45 group focus:outline-none focus:ring-4 focus:ring-primary-container" data-type="ray">
<svg class="stroke-on-surface fill-on-surface shape-svg transition-colors duration-200" height="100" viewbox="0 0 100 100" width="100">
<!-- Dot start, Arrow end -->
<circle class="dot-element" cx="15" cy="50" r="8"></circle>
<line class="line-element" stroke-linecap="round" stroke-width="4" x1="15" x2="80" y1="50" y2="50"></line>
<polygon class="arrow-element" points="80,35 100,50 80,65"></polygon>
</svg>
</button>
<!-- Shape 4: Point (Distractor) -->
<button class="shape-btn absolute bottom-[20%] left-[30%] md:left-[40%] p-6 border-[3px] border-transparent hover:border-on-surface hover:bg-surface-variant transition-all rounded-sm cursor-pointer group focus:outline-none focus:ring-4 focus:ring-secondary-container" data-type="point">
<svg class="stroke-on-surface fill-on-surface group-hover:stroke-outline group-hover:fill-outline transition-colors" height="40" viewbox="0 0 100 100" width="40">
<circle cx="50" cy="50" r="16"></circle>
</svg>
</button>
<!-- Shape 5: Ray (Target 2) -->
<button class="shape-btn target-ray absolute bottom-[15%] right-[10%] md:right-[20%] p-4 border-[3px] border-transparent hover:border-on-surface hover:bg-surface-variant transition-all rounded-sm cursor-pointer -rotate-12 group focus:outline-none focus:ring-4 focus:ring-primary-container" data-type="ray">
<svg class="stroke-on-surface fill-on-surface shape-svg transition-colors duration-200" height="110" viewbox="0 0 100 100" width="110">
<!-- Arrow start, Dot end (reversed ray visually, still a ray) -->
<polygon class="arrow-element" points="20,35 0,50 20,65"></polygon>
<line class="line-element" stroke-linecap="round" stroke-width="4" x1="20" x2="85" y1="50" y2="50"></line>
<circle class="dot-element" cx="85" cy="50" r="8"></circle>
</svg>
</button>
<!-- Shape 6: Line (Distractor) -->
<button class="shape-btn absolute top-[70%] left-[60%] md:top-[10%] md:left-[60%] p-4 border-[3px] border-transparent hover:border-on-surface hover:bg-surface-variant transition-all rounded-sm cursor-pointer rotate-90 group focus:outline-none focus:ring-4 focus:ring-secondary-container" data-type="line">
<svg class="stroke-on-surface fill-on-surface group-hover:stroke-secondary group-hover:fill-secondary transition-colors" height="85" viewbox="0 0 100 100" width="85">
<polygon points="20,40 0,50 20,60"></polygon>
<line stroke-linecap="round" stroke-width="4" x1="20" x2="80" y1="50" y2="50"></line>
<polygon points="80,40 100,50 80,60"></polygon>
</svg>
</button>
</div>
<!-- Action Bar (Optional context info, inside canvas) -->
<div class="mt-auto border-t-[3px] border-on-surface bg-surface p-4 flex justify-between items-center z-10">
<span class="font-label-bold text-label-bold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">lightbulb</span>
                    Look for the end point.
                </span>
<span class="font-headline-md text-headline-md font-bold text-primary" id="score-counter">
                    0/2 Found
                </span>
</div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const shapes = document.querySelectorAll('.shape-btn');
            const scoreCounter = document.getElementById('score-counter');
            let foundCount = 0;
            const totalRays = 2;

            shapes.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const isRay = this.dataset.type === 'ray';
                    
                    if (isRay) {
                        // Correct action
                        if (!this.classList.contains('found')) {
                            this.classList.add('found');
                            
                            // Apply Gulabi Pink feedback style
                            this.classList.remove('border-transparent', 'hover:border-on-surface', 'hover:bg-surface-variant');
                            this.classList.add('border-on-surface', 'bg-primary-fixed', 'shape-active-shadow');
                            
                            // Change SVG colors
                            const svg = this.querySelector('.shape-svg');
                            if(svg) {
                                svg.classList.remove('stroke-on-surface', 'fill-on-surface');
                                svg.classList.add('stroke-primary', 'fill-primary');
                            }

                            // Interaction animation
                            this.classList.add('shape-pressed');
                            setTimeout(() => {
                                this.classList.remove('shape-pressed');
                            }, 150);

                            // Update score
                            foundCount++;
                            scoreCounter.textContent = `${foundCount}/${totalRays} Found`;

                            // Check completion
                            if(foundCount === totalRays) {
                                setTimeout(() => {
                                    scoreCounter.textContent = "Great Job!";
                                    scoreCounter.classList.add('text-secondary-container', 'animate-pulse');
                                }, 500);
                            }
                        }
                    } else {
                        // Incorrect action (Distractor)
                        this.classList.remove('animate-wiggle'); // Reset animation
                        void this.offsetWidth; // Trigger reflow
                        this.classList.add('animate-wiggle');
                        
                        // Subtle error feedback flash
                        this.classList.add('bg-error-container/50');
                        setTimeout(() => {
                            this.classList.remove('bg-error-container/50');
                        }, 300);
                    }
                });
            });
        });
    </script>
</body></html>
